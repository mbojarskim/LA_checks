<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biuro zawodów 2</title>
<!-- Biblioteka do dekodowania zdjęć -->
<script src="https://unpkg.com"></script>

<style>
  body { font-family: sans-serif; text-align: center; background:#f2f2f2; margin: 0; padding: 15px; }
  .btn-big { width: 100%; padding: 22px; margin: 10px 0; font-size: 20px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
  .blue { background:#2196F3; color:white; }
  .green { background:#4CAF50; color:white; }
  .orange { background:#ff9800; color:white; }
  .gray { background:#757575; color:white; }
  .card { background:white; margin: 15px 0; padding: 20px; border-radius: 15px; display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  input[type="text"], input[type="number"] { width: 90%; padding: 15px; margin: 8px 0; font-size: 18px; border: 1px solid #ccc; border-radius: 8px; }
  
  /* Ukryty input aparatu */
  #qr-input { display: none; }
</style>
</head>

<body>

<h2>📋 Biuro zawodów 2</h2>

<div id="menu">
  <!-- Przycisk klika w ukryty input aparatu -->
  <button class="btn-big blue" onclick="document.getElementById('qr-input').click()">📷 SKANUJ KOD (APARAT)</button>
  <button class="btn-big green" onclick="pokazSekcje('sekcja-nowy')">➕ NOWY ZAWODNIK</button>
  <button class="btn-big gray" onclick="pokazSekcje('sekcja-szukaj')">🔍 SZUKAJ</button>
</div>

<!-- UKRYTY INPUT DO APARATU -->
<input type="file" id="qr-input" accept="image/*" capture="environment">

<!-- DANE ZAWODNIKA -->
<div id="zawodnik" class="card"></div>

<!-- EDYCJA -->
<div id="edycja" class="card">
  <h3>✏️ Edycja</h3>
  <input id="e_imie"> <input id="e_nazwisko"> <input id="e_rocznik"> <input id="e_konkurencje">
  <button class="btn-big green" onclick="zapiszEdycje()">💾 ZAPISZ</button>
</div>

<!-- NOWY -->
<div id="sekcja-nowy" class="card">
  <h3>➕ Nowy zawodnik</h3>
  <input id="imie" placeholder="Imię"> <input id="nazwisko" placeholder="Nazwisko"> <input id="rocznik" placeholder="Rocznik"> <input id="konkurencje" placeholder="Konkurencje">
  <button class="btn-big green" onclick="dodaj()">DODAJ</button>
  <button class="btn-big gray" onclick="ukryjWszystko()">POWRÓT</button>
</div>

<!-- SZUKAJ -->
<div id="sekcja-szukaj" class="card">
  <h3>🔍 Szukaj</h3>
  <p>Opcja wkrótce...</p>
  <button class="btn-big gray" onclick="ukryjWszystko()">POWRÓT</button>
</div>

<script>
const API_URL = "TU_WKLEJ_URL";
let currentId = null;
const html5QrCode = new Html5Qrcode("zawodnik"); // Inicjalizacja biblioteki w tle

// OBSŁUGA APARATU (ZDJĘCIA)
document.getElementById('qr-input').addEventListener('change', e => {
  if (e.target.files.length == 0) return;
  const imageFile = e.target.files[0];
  
  // Skanowanie zdjęcia
  html5QrCode.scanFile(imageFile, true)
    .then(decodedText => {
      pobierzDane(decodedText);
    })
    .catch(err => {
      alert("Nie udało się odczytać kodu. Spróbuj zrobić wyraźniejsze zdjęcie.");
    });
});

function pobierzDane(id) {
  fetch(API_URL + "?id=" + id)
    .then(res => res.json())
    .then(d => {
      currentId = d.id;
      ukryjWszystko();
      const zDiv = document.getElementById("zawodnik");
      zDiv.style.display = "block";
      zDiv.innerHTML = `
        <h2>${d.imie} ${d.nazwisko}</h2>
        <p>Nr: <b>${d.nr_startowy || "-"}</b></p>
        <button class="btn-big green" onclick="checkin()">✔ WYDAJ PAKIET</button>
        <button class="btn-big orange" onclick="document.getElementById('edycja').style.display='block'">✏️ EDYTUJ</button>
      `;
      document.getElementById("e_imie").value = d.imie;
      document.getElementById("e_nazwisko").value = d.nazwisko;
      document.getElementById("e_rocznik").value = d.rocznik;
      document.getElementById("e_konkurencje").value = d.konkurencje;
    })
    .catch(err => alert("Błąd bazy danych lub nieprawidłowy kod."));
}

function ukryjWszystko() {
  document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
}

function pokazSekcje(id) {
  ukryjWszystko();
  document.getElementById(id).style.display = 'block';
}

function checkin() {
  fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "checkin", id: currentId }) })
  .then(() => { alert("✅ Pakiet wydany"); ukryjWszystko(); });
}

function zapiszEdycje() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "edit", id: currentId,
      imie: document.getElementById("e_imie").value,
      nazwisko: document.getElementById("e_nazwisko").value,
      rocznik: document.getElementById("e_rocznik").value,
      konkurencje: document.getElementById("e_konkurencje").value
    })
  }).then(() => { alert("💾 Zapisano"); ukryjWszystko(); });
}

function dodaj() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "add",
      imie: document.getElementById("imie").value,
      nazwisko: document.getElementById("nazwisko").value,
      rocznik: document.getElementById("rocznik").value,
      konkurencje: document.getElementById("konkurencje").value
    })
  })
  .then(res => res.json())
  .then(data => { alert("Dodano!"); ukryjWszystko(); });
}
</script>
</body>
</html>

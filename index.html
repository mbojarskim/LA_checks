<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Biuro Zawodów</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h1 {
      font-size: 22px;
    }

    #reader {
      width: 300px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    button {
      padding: 15px;
      margin: 5px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
    }

    .green { background: #4CAF50; color: white; }
    .blue { background: #2196F3; color: white; }
    .red { background: #f44336; color: white; }

    input {
      padding: 10px;
      margin: 5px;
      width: 80%;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h1>📋 Biuro zawodów</h1>

<div id="reader"></div>

<div id="wynik" class="card">Zeskanuj QR</div>

<button class="blue" onclick="pokazDodawanie()">➕ Nowy zawodnik</button>

<div id="dodawanie" class="card" style="display:none;">
  <h3>Nowy zawodnik</h3>
  <input id="imie" placeholder="Imię"><br>
  <input id="nazwisko" placeholder="Nazwisko"><br>
  <input id="rocznik" placeholder="Rocznik"><br>
  <input id="konkurencje" placeholder="Konkurencje"><br>

  <button class="green" onclick="dodaj()">Zapisz</button>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyCa1bGgo4CarwRp3JjYYwML3SQghse-MvQxEjByvlXj8SLP5eXrPC-NZduQizwLgMx/exec";

function onScanSuccess(decodedText) {
  fetch(API_URL + "?id=" + decodedText)
    .then(res => res.text())
    .then(text => {
      if (text === "NOT_FOUND") {
        document.getElementById("wynik").innerHTML = "❌ Nie znaleziono";
        return;
      }

      const data = JSON.parse(text);

      document.getElementById("wynik").innerHTML = `
        <h2>${data.imie} ${data.nazwisko}</h2>
        <b>Nr:</b> ${data.nr_startowy || "-"}<br>
        <b>Rocznik:</b> ${data.rocznik}<br>
        <b>Konkurencje:</b> ${data.konkurencje}<br>
        <b>Pakiet:</b> ${data.pakiet}<br><br>

        <button class="green" onclick="checkin(${data.id})">✔ Wydaj pakiet</button>
      `;
    });
}

function checkin(id) {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "checkin",
      id: id
    })
  })
  .then(() => {
    alert("✅ Pakiet wydany");
  });
}

function pokazDodawanie() {
  const el = document.getElementById("dodawanie");
  el.style.display = el.style.display === "none" ? "block" : "none";
}

function dodaj() {
  const imie = document.getElementById("imie").value;
  const nazwisko = document.getElementById("nazwisko").value;
  const rocznik = document.getElementById("rocznik").value;
  const konkurencje = document.getElementById("konkurencje").value;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "add",
      imie,
      nazwisko,
      rocznik,
      konkurencje
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("✅ Dodano! ID: " + data.id);
  });
}

new Html5Qrcode("reader").start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 250 },
  onScanSuccess
);

</script>

</body>
</html>

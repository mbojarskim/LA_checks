<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Biuro zawodów</title>
<script src="https://unpkg.com"></script>

<style>
  body { font-family: Arial; margin: 0; padding: 0; background: #f2f2f2; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  
  /* GÓRA - SKANER */
  #top-section { flex: 1; background: #000; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; }
  #reader { width: 100%; height: 100%; }
  #start-overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; justify-content: center; align-items: center; z-index: 20; }

  /* DÓŁ - PANEL */
  #bottom-section { flex: 1; padding: 15px; overflow-y: auto; background: white; border-top: 3px solid #2196F3; }

  button { width: 100%; padding: 20px; margin-bottom: 10px; font-size: 20px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; }
  .blue { background: #2196F3; color: white; }
  .green { background: #4CAF50; color: white; }
  .orange { background: #ff9800; color: white; }
  .gray { background: #757575; color: white; }

  .card { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: none; border: 1px solid #ddd; }
  input { width: 100%; padding: 15px; margin: 5px 0; font-size: 18px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
</style>
</head>

<body>

<div id="top-section">
  <!-- Nakładka startowa - wymuszona przez politykę prywatności przeglądarek -->
  <div id="start-overlay">
    <button class="blue" style="width: 80%;" onclick="inicjujAparat()">🚀 KLIKNIJ, ABY WŁĄCZYĆ APARAT</button>
  </div>
  <div id="reader"></div>
</div>

<div id="bottom-section">
  
  <div id="menu-glowne">
    <button class="green" onclick="pokazSekcje('sekcja-nowy')">➕ NOWY ZAWODNIK</button>
    <button class="gray" onclick="pokazSekcje('sekcja-szukaj')">🔍 SZUKAJ (DUMMY)</button>
  </div>

  <div id="zawodnik" class="card"></div>

  <div id="edycja" class="card">
    <h3>Edycja zawodnika</h3>
    <input id="e_imie"> <input id="e_nazwisko"> <input id="e_rocznik"> <input id="e_konkurencje">
    <button class="green" onclick="zapiszEdycje()">💾 ZAPISZ</button>
    <button class="gray" onclick="ukryjSekcje()">ANULUJ</button>
  </div>

  <div id="sekcja-nowy" class="card">
    <h3>Dodaj zawodnika</h3>
    <input id="imie" placeholder="Imię"> <input id="nazwisko" placeholder="Nazwisko"> <input id="rocznik" placeholder="Rocznik"> <input id="konkurencje" placeholder="Konkurencje">
    <button class="green" onclick="dodaj()">ZAPISZ</button>
    <button class="gray" onclick="ukryjSekcje()">WSTECZ</button>
  </div>

  <div id="sekcja-szukaj" class="card">
    <h3>Wyszukiwarka</h3>
    <p>Opcja dummy...</p>
    <button class="gray" onclick="ukryjSekcje()">WSTECZ</button>
  </div>

</div>

<script>
const API_URL = "TU_WKLEJ_URL";
let currentId = null;
let html5QrCode = null;

async function inicjujAparat() {
  document.getElementById('start-overlay').style.display = 'none';
  
  if (!html5QrCode) {
    html5QrCode = new Html5Qrcode("reader");
  }

  const config = { fps: 10, qrbox: { width: 250, height: 250 } };

  try {
    await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
  } catch (err) {
    alert("Błąd aparatu: " + err);
    document.getElementById('start-overlay').style.display = 'flex';
  }
}

function onScanSuccess(id) {
  // Nie wyłączamy aparatu, tylko pobieramy dane
  fetch(API_URL + "?id=" + id)
    .then(res => res.text())
    .then(text => {
      if (text === "NOT_FOUND") { alert("Nie znaleziono!"); return; }
      const d = JSON.parse(text);
      currentId = d.id;
      
      ukryjSekcje();
      const z = document.getElementById("zawodnik");
      z.style.display = "block";
      z.innerHTML = `
        <h2 style="margin:5px">${d.imie} ${d.nazwisko}</h2>
        <p>Nr: <b>${d.nr_startowy || "-"}</b></p>
        <button class="green" onclick="checkin()">✔ WYDAJ PAKIET</button>
        <button class="orange" onclick="pokazEdycje()">✏️ EDYTUJ</button>
      `;
      document.getElementById("e_imie").value = d.imie;
      document.getElementById("e_nazwisko").value = d.nazwisko;
      document.getElementById("e_rocznik").value = d.rocznik;
      document.getElementById("e_konkurencje").value = d.konkurencje;
    });
}

function pokazSekcje(id) {
  ukryjSekcje();
  document.getElementById(id).style.display = 'block';
  document.getElementById('menu-glowne').style.display = 'none';
}

function ukryjSekcje() {
  document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
  document.getElementById('menu-glowne').style.display = 'block';
}

function pokazEdycje() {
  document.getElementById('edycja').style.display = 'block';
}

function checkin() {
  fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "checkin", id: currentId }) })
  .then(() => { alert("✅ Pakiet wydany"); ukryjSekcje(); });
}

function zapiszEdycje() {
  fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "edit", id: currentId, imie: document.getElementById("e_imie").value, nazwisko: document.getElementById("e_nazwisko").value, rocznik: document.getElementById("e_rocznik").value, konkurencje: document.getElementById("e_konkurencje").value }) })
  .then(() => { alert("💾 Zapisano"); ukryjSekcje(); });
}

function dodaj() {
  fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "add", imie: document.getElementById("imie").value, nazwisko: document.getElementById("nazwisko").value, rocznik: document.getElementById("rocznik").value, konkurencje: document.getElementById("konkurencje").value }) })
  .then(res => res.json())
  .then(data => { alert("Dodano!"); ukryjSekcje(); });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biuro Zawodów</title>
    <!-- Biblioteka QR -->
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f2f2f2; margin: 0; padding: 10px; }
        .card { background: white; margin: 10px auto; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { width: 95%; padding: 15px; margin: 5px 0; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; color: white; }
        input { width: 90%; padding: 12px; margin: 5px 0; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        
        .blue { background: #2196F3; }
        .green { background: #4CAF50; }
        .orange { background: #ff9800; }
        .gray { background: #757575; }

        #reader { width: 100%; min-height: 250px; background: #eee; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        #profil-zawodnika { text-align: left; }
        .status-ok { color: green; font-weight: bold; }
        .status-wait { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <h2>📋 Biuro Zawodów</h2>

    <!-- GŁÓWNE PRZYCISKI (Zawsze widoczne dla ułatwienia) -->
    <button class="blue" onclick="startScan()">📷 SKANUJ KOD QR</button>
    <div id="reader"></div>

    <div class="card">
        <h3>🔎 Szukaj po nazwisku</h3>
        <input type="text" id="szukaj-input" placeholder="Wpisz nazwisko...">
        <button class="blue" onclick="szukajNazwiska()">Szukaj</button>
    </div>

    <!-- WYNIKI WYSZUKIWANIA -->
    <div id="wyniki" style="display:none;"></div>

    <!-- PROFIL ZAWODNIKA -->
    <div id="profil-zawodnika" class="card" style="display:none;">
        <div id="dane-zawodnika"></div>
        <hr>
        <h4>Edytuj dane:</h4>
        <input id="e-imie" placeholder="Imię">
        <input id="e-nazwisko" placeholder="Nazwisko">
        <input id="e-rocznik" placeholder="Rocznik">
        <input id="e-konk" placeholder="Konkurencje">
        <button class="green" onclick="zapiszEdycje()">ZAPISZ ZMIANY</button>
    </div>

    <button class="orange" onclick="toggleDodawanie()">➕ DODAJ NOWEGO</button>
    <div id="form-dodawania" class="card" style="display:none;">
        <input id="n-imie" placeholder="Imię">
        <input id="n-nazwisko" placeholder="Nazwisko">
        <input id="n-rocznik" placeholder="Rocznik">
        <input id="n-konk" placeholder="Konkurencje">
        <input id="n-nr" placeholder="Numer startowy">
        <button class="green" onclick="dodajNowego()">DODAJ DO BAZY</button>
    </div>

<script>
// !!! PODMIEŃ NA SWÓJ LINK !!!
const API_URL = "https://script.google.com";

let html5QrCode = null;
let currentId = null;

// 1. SKANOWANIE
async function startScan() {
    try {
        if (html5QrCode) {
            await html5QrCode.stop().catch(() => {});
        }
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            (text) => {
                html5QrCode.stop();
                document.getElementById("reader").innerHTML = "";
                pobierzDane(text);
            }
        ).catch(err => alert("Błąd kamery: " + err));
    } catch (e) {
        alert("Błąd startu: " + e);
    }
}

// 2. POBIERANIE DANYCH
function pobierzDane(id) {
    fetch(API_URL + "?id=" + id)
    .then(r => r.json())
    .then(d => {
        if(d === "NOT_FOUND") return alert("Nie znaleziono!");
        pokazProfil(d);
    })
    .catch(e => alert("Błąd pobierania: " + e));
}

function pokazProfil(d) {
    currentId = d.id;
    document.getElementById("profil-zawodnika").style.display = "block";
    document.getElementById("wyniki").style.display = "none";
    
    const status = d.pakiet === "TAK" ? "<span class='status-wait'>ODEBRANY</span>" : "<span class='status-ok'>NIE ODEBRANY</span>";
    
    document.getElementById("dane-zawodnika").innerHTML = `
        <strong>${d.imie} ${d.nazwisko}</strong><br>
        Nr: ${d.nr_startowy} | Rocznik: ${d.rocznik}<br>
        Konkurencje: ${d.konkurencje}<br>
        Pakiet: ${status}<br>
        ${d.pakiet !== "TAK" ? '<button class="green" onclick="wydajPakiet()">✔ WYDAJ PAKIET</button>' : ''}
    `;

    // Wypełnij pola edycji
    document.getElementById("e-imie").value = d.imie;
    document.getElementById("e-nazwisko").value = d.nazwisko;
    document.getElementById("e-rocznik").value = d.rocznik;
    document.getElementById("e-konk").value = d.konkurencje;
}

// 3. WYSZUKIWANIE
function szukajNazwiska() {
    const term = document.getElementById("szukaj-input").value;
    if(term.length < 2) return alert("Wpisz min. 2 znaki");

    fetch(API_URL + "?search=" + encodeURIComponent(term))
    .then(r => r.json())
    .then(list => {
        const div = document.getElementById("wyniki");
        div.style.display = "block";
        div.innerHTML = "<h4>Wyniki:</h4>";
        list.forEach(z => {
            div.innerHTML += `<div class="card" onclick="pobierzDane('${z.id}')">${z.imie} ${z.nazwisko} (Nr: ${z.nr_startowy})</div>`;
        });
    });
}

// 4. POSTY (ZAPISYWANIE)
function wydajPakiet() {
    fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "checkin", id: currentId }) })
    .then(() => { alert("Wydano!"); pobierzDane(currentId); });
}

function zapiszEdycje() {
    const data = {
        action: "edit", id: currentId,
        imie: document.getElementById("e-imie").value,
        nazwisko: document.getElementById("e-nazwisko").value,
        rocznik: document.getElementById("e-rocznik").value,
        konkurencje: document.getElementById("e-konk").value
    };
    fetch(API_URL, { method: "POST", body: JSON.stringify(data) }).then(() => alert("Zapisano!"));
}

function toggleDodawanie() {
    const f = document.getElementById("form-dodawania");
    f.style.display = f.style.display === "none" ? "block" : "none";
}

function dodajNowego() {
    const data = {
        action: "add",
        imie: document.getElementById("n-imie").value,
        nazwisko: document.getElementById("n-nazwisko").value,
        rocznik: document.getElementById("n-rocznik").value,
        konkurencje: document.getElementById("n-konk").value,
        nr_startowy: document.getElementById("n-nr").value
    };
    fetch(API_URL, { method: "POST", body: JSON.stringify(data) }).then(() => { alert("Dodano!"); location.reload(); });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biuro zawodów 3</title>
<script src="https://unpkg.com"></script>

<style>
  body { font-family: sans-serif; text-align: center; background:#f2f2f2; margin: 0; padding: 10px; }
  
  /* SKANER NA GÓRZE */
  #reader { 
    width: 100%; 
    max-width: 500px; 
    margin: 0 auto; 
    background: #000; 
    border-radius: 15px; 
    overflow: hidden;
  }

  /* MENU POD SKANEREM */
  .menu-container { display: flex; flex-direction: column; gap: 10px; max-width: 500px; margin: 15px auto; }
  
  .btn-main { 
    width: 100%; padding: 22px; font-size: 20px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; 
  }
  .blue { background:#2196F3; color:white; }
  .green { background:#4CAF50; color:white; }
  .gray { background:#757575; color:white; }
  .orange { background:#ff9800; color:white; }

  /* KARTY / NAKŁADKI */
  .card { 
    background:white; padding:20px; border-radius:15px; margin: 10px auto; max-width: 500px; 
    display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
  }
  input { width: 100%; padding: 15px; margin: 8px 0; font-size: 18px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
</style>
</head>

<body>

<div id="naglowek">
  <h2 style="margin: 10px 0;">📷 Skaner aktywny</h2>
</div>

<!-- SKANER INICJOWANY NA STARCCIE -->
<div id="reader"></div>

<!-- MENU GŁÓWNE -->
<div class="menu-container">
  <button class="btn-main blue" onclick="restartScan()">🔄 RESTART KAMERY</button>
  <button class="btn-main green" onclick="pokazSekcje('sekcja-nowy')">➕ NOWY ZAWODNIK</button>
  <button class="btn-main gray" onclick="pokazSekcje('sekcja-szukaj')">🔍 SZUKAJ (DUMMY)</button>
</div>

<!-- DANE PO SKANOWANIU -->
<div id="sekcja-wynik" class="card">
  <div id="dane-zawodnika"></div>
  <hr>
  <input id="e_imie" placeholder="Imię">
  <input id="e_nazwisko" placeholder="Nazwisko">
  <input id="e_rocznik" placeholder="Rocznik">
  <input id="e_konkurencje" placeholder="Konkurencje">
  <button class="btn-main green" onclick="zapiszEdycje()">💾 ZAPISZ ZMIANY</button>
  <button class="btn-main orange" style="margin-top:10px" onclick="checkin()">✔ WYDAJ PAKIET</button>
  <button class="btn-main gray" style="margin-top:10px" onclick="zamknijWynik()">POWRÓT DO SKANERA</button>
</div>

<!-- SEKCJA: NOWY ZAWODNIK -->
<div id="sekcja-nowy" class="card">
  <h3>Dodaj zawodnika</h3>
  <input id="imie" placeholder="Imię">
  <input id="nazwisko" placeholder="Nazwisko">
  <input id="rocznik" placeholder="Rocznik">
  <input id="konkurencje" placeholder="Konkurencje">
  <button class="btn-main green" onclick="dodaj()">DODAJ</button>
  <button class="btn-main gray" style="margin-top:10px" onclick="ukryjSekcje()">ANULUJ</button>
</div>

<!-- SEKCJA: SZUKAJ -->
<div id="sekcja-szukaj" class="card">
  <h3>Wyszukiwarka</h3>
  <p>Opcja wkrótce...</p>
  <button class="btn-main gray" onclick="ukryjSekcje()">POWRÓT</button>
</div>

<script>
const API_URL = "TU_WKLEJ_URL";
let currentId = null;
let html5QrCode = null;

// AUTO-START KAMERY PRZY ŁADOWANIU
window.onload = function() {
    html5QrCode = new Html5Qrcode("reader");
    restartScan();
};

function restartScan() {
    const config = { fps: 10, qrbox: { width: 250, height: 250 } };
    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
    .catch(err => console.error("Kamera nie ruszyła:", err));
}

function onScanSuccess(decodedText) {
    html5QrCode.pause(true); // Pauzujemy kamerę zamiast stopować (szybsze)
    
    fetch(API_URL + "?id=" + decodedText)
    .then(res => res.json())
    .then(d => {
        currentId = d.id;
        document.getElementById('sekcja-wynik').style.display = 'block';
        document.getElementById('dane-zawodnika').innerHTML = `<h3>${d.imie} ${d.nazwisko}</h3>`;
        
        document.getElementById("e_imie").value = d.imie;
        document.getElementById("e_nazwisko").value = d.nazwisko;
        document.getElementById("e_rocznik").value = d.rocznik;
        document.getElementById("e_konkurencje").value = d.konkurencje;
        
        window.scrollTo(0, document.body.scrollHeight);
    })
    .catch(err => {
        alert("Błąd bazy danych!");
        html5QrCode.resume();
    });
}

function zamknijWynik() {
    document.getElementById('sekcja-wynik').style.display = 'none';
    html5QrCode.resume();
}

function pokazSekcje(id) {
    ukryjSekcje();
    document.getElementById(id).style.display = 'block';
    window.scrollTo(0, document.body.scrollHeight);
}

function ukryjSekcje() {
    document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
}

// AKCJE API
function checkin() {
    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "checkin", id: currentId })
    }).then(() => {
        alert("✅ Pakiet wydany!");
        zamknijWynik();
    });
}

function zapiszEdycje() {
    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            action: "edit", id: currentId,
            imie: document.getElementById("e_imie").value,
            nazwisko: document.getElementById("e_nazwisko").value,
            rocznik: document.getElementById("e_rocznik").value,
            konkurencje: document.getElementById("e_konkurencje").value
        })
    }).then(() => {
        alert("💾 Zaktualizowano");
        zamknijWynik();
    });
}

function dodaj() {
    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            action: "add",
            imie: document.getElementById("imie").value,
            nazwisko: document.getElementById("nazwisko").value,
            rocznik: document.getElementById("rocznik").value,
            konkurencje: document.getElementById("konkurencje").value
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("Dodano zawodnika!");
        ukryjSekcje();
        document.querySelectorAll('#sekcja-nowy input').forEach(i => i.value = "");
    });
}
</script>

</body>
</html>

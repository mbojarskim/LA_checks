<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Biuro zawodów</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
html, body {
  height: 100%;
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
}

/* =========================
   🟦 MENU STARTOWE (FULL SCREEN)
   ========================= */
#menu {
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* duże kafle na cały ekran */
.tile {
  flex: 1;
  width: 100%;
  font-size: 32px;
  border: none;
  color: white;
  cursor: pointer;
}

/* kolory przycisków */
.blue { background: #2196F3; }
.green { background: #4CAF50; }
.orange { background: #ff9800; }

/* =========================
   🧾 OGÓLNE KARTY (ZAWODNIK / WYNIKI)
   ========================= */
.card {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

/* =========================
   🔘 PRZYCISKI STANDARDOWE (wewnątrz widoków)
   ========================= */
button {
  width: 90%;
  padding: 16px;
  margin: 6px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
}

/* =========================
   ✏️ INPUTY (telefon friendly)
   ========================= */
input {
  width: 90%;
  padding: 12px;
  margin: 6px;
  font-size: 18px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* =========================
   📷 SCANNER (kamera QR)
   ========================= */
#reader {
  width: 100%;
}

/* =========================
   📱 RESPONSYWNOŚĆ (opcjonalnie, ale pomaga)
   ========================= */
@media (max-width: 600px) {
  .tile {
    font-size: 28px;
  }

  button {
    font-size: 20px;
  }

  input {
    font-size: 20px;
  }
}
</style>
</head>

<body>

<h2>📋 Biuro zawodów</h2>
<button onclick="backToMenu()">🏠 MENU</button>
<!-- 🔎 SEARCH -->
<div class="card">
  <h3>🔎 Szukaj</h3>
  <input id="szukaj" placeholder="Nazwisko">
  <button class="blue" onclick="szukaj()">Szukaj</button>
</div>

<!-- 📷 SCAN -->
<button class="blue" onclick="startScan()">📷 Skanuj zawodnika</button>

<div id="reader"></div>

<!-- 👤 ZAWODNIK -->
<div id="zawodnik" class="card" style="display:none;"></div>

<!-- ✏ EDYCJA -->
<div id="edycja" class="card" style="display:none;">
  <h3>Edycja</h3>

  <input id="e_imie"><br>
  <input id="e_nazwisko"><br>
  <input id="e_rocznik"><br>
  <input id="e_konkurencje"><br>

  <button class="green" onclick="zapisz()">Zapisz</button>
</div>

<!-- ➕ DODAWANIE -->
<button class="green" onclick="toggleAdd()">➕ Dodaj zawodnika</button>

<div id="add" class="card" style="display:none;">
  <h3>Nowy zawodnik</h3>

  <input id="imie" placeholder="Imię"><br>
  <input id="nazwisko" placeholder="Nazwisko"><br>
  <input id="rocznik" placeholder="Rocznik"><br>
  <input id="konkurencje" placeholder="Konkurencje"><br>
  <input id="nr" placeholder="Numer startowy"><br>

  <button class="green" onclick="dodaj()">Zapisz</button>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyCa1bGgo4CarwRp3JjYYwML3SQghse-MvQxEjByvlXj8SLP5eXrPC-NZduQizwLgMx/exec";

let currentId = null;
let scanner = null;

// 🔁 RESET
function reset() {
  document.getElementById("zawodnik").style.display = "none";
  document.getElementById("edycja").style.display = "none";
  document.getElementById("add").style.display = "none";
  document.getElementById("reader").innerHTML = "";
  currentId = null;
}

// 📷 SCAN
function startScan() {
  hideMenu();
  reset();
  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScan
  );
}

function onScan(id) {
  scanner.stop();

  fetch(API_URL + "?id=" + id)
    .then(r => r.json())
    .then(d => {
      currentId = d.id;

      document.getElementById("zawodnik").style.display = "block";

      document.getElementById("zawodnik").innerHTML = `
        <h3>${d.imie} ${d.nazwisko}</h3>
        Nr: ${d.nr_startowy || "-"}<br>
        Rocznik: ${d.rocznik}<br>
        Konkurencje: ${d.konkurencje}<br>
        Pakiet: ${d.pakiet === "TAK" ? "🔴 ODEBRANY" : "🟢 NIE"}<br><br>

        ${
          d.pakiet === "TAK"
          ? "<button disabled>Już odebrany</button>"
          : '<button class="green" onclick="checkin()">✔ Wydaj pakiet</button>'
        }

        <button class="orange" onclick="editMode()">✏ Edytuj</button>
      `;

      document.getElementById("e_imie").value = d.imie;
      document.getElementById("e_nazwisko").value = d.nazwisko;
      document.getElementById("e_rocznik").value = d.rocznik;
      document.getElementById("e_konkurencje").value = d.konkurencje;
    });
}

// ✔ PACKET
function checkin() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "checkin",
      id: currentId
    })
  }).then(() => {
    alert("Wydano pakiet");
    reset();
  });
}

// ✏ EDIT
function editMode() {
  document.getElementById("edycja").style.display = "block";
}

function zapisz() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "edit",
      id: currentId,
      imie: e_imie.value,
      nazwisko: e_nazwisko.value,
      rocznik: e_rocznik.value,
      konkurencje: e_konkurencje.value
    })
  }).then(() => {
    alert("Zapisano");
    reset();
  });
}

// ➕ ADD
function toggleAdd() {
  reset();
  document.getElementById("add").style.display =
    document.getElementById("add").style.display === "block" ? "none" : "block";
}

function dodaj() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "add",
      imie: imie.value,
      nazwisko: nazwisko.value,
      rocznik: rocznik.value,
      konkurencje: konkurencje.value,
      nr_startowy: nr.value
    })
  })
  .then(r => r.json())
  .then(() => {
    alert("Dodano zawodnika");
    reset();
  });
}

// 🔎 SEARCH
function szukaj() {
  fetch(API_URL + "?search=" + szukaj.value)
    .then(r => r.json())
    .then(list => {

      let html = "<h3>Wyniki</h3>";

      list.forEach(z => {
        html += `
          <div class="card">
            ${z.imie} ${z.nazwisko}
            <br>
            <button onclick="onScan('${z.id}')">Wybierz</button>
          </div>
        `;
      });

      document.getElementById("zawodnik").style.display = "block";
      document.getElementById("zawodnik").innerHTML = html;
    });
}
// Ukrywanie menu
function hideMenu() {
  document.getElementById("menu").style.display = "none";
}

// Pokazanie wynikow  
function showSearch() {
  hideMenu();

  document.getElementById("zawodnik").style.display = "block";

  document.getElementById("zawodnik").innerHTML = `
    <h2>🔎 Szukaj zawodnika</h2>
    <input id="szukajInput" style="width:90%;font-size:24px;padding:10px;">
    <button class="tile green" style="flex:0;height:120px;font-size:24px;" onclick="szukaj()">Szukaj</button>
  `;
}

// Powrot do Menu  
function backToMenu() {
  document.getElementById("menu").style.display = "flex";
  reset();
}
  
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Skaner QR</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<h2>Skaner QR</h2>

<div id="reader" style="width:300px;"></div>

<div id="result" style="margin-top:20px;"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyCa1bGgo4CarwRp3JjYYwML3SQghse-MvQxEjByvlXj8SLP5eXrPC-NZduQizwLgMx/exec";

function showData(data) {
  let html = `
    <p><b>${data.imie} ${data.nazwisko}</b></p>
    <p>Nr startowy: ${data.nr}</p>
    <p>Konkurencje: ${data.konkurencja1 || "-"}, ${data.konkurencja2 || "-"}</p>
    <p>Status: ${data.pakiet || "NIE"}</p>
  `;

  if (data.pakiet === "TAK") {
    html += `<p style="color:red;">Pakiet już odebrany</p>`;
  } else {
    html += `<button onclick="odbierz(${data.row})">Odbierz pakiet</button>`;
  }

  document.getElementById("result").innerHTML = html;
}

function odbierz(row) {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({row: row})
  })
  .then(r => r.json())
  .then(() => {
    alert("Zapisano!");
    document.getElementById("result").innerHTML = "";
  });
}

function onScanSuccess(decodedText) {
  fetch(API_URL + "?id=" + decodedText)
    .then(r => r.json())
    .then(data => {
      if (data.found) {
        showData(data);
      } else {
        document.getElementById("result").innerHTML = "Nie znaleziono";
      }
    });
}

const html5QrCode = new Html5Qrcode("reader");
html5QrCode.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 250 },
  onScanSuccess
);
</script>

</body>
</html>

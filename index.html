<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biuro zawodów 2</title>
<script src="https://unpkg.com"></script>

<style>
  body { font-family: Arial; text-align: center; background:#f2f2f2; margin:0; padding:10px; }

  /* OGROMNE PRZYCISKI MENU */
  .menu-btn {
    width: 95%;
    padding: 25px;
    margin: 10px auto;
    font-size: 22px;
    font-weight: bold;
    border: none;
    border-radius: 15px;
    display: block;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }

  .blue { background:#2196F3; color:white; }
  .green { background:#4CAF50; color:white; }
  .orange { background:#ff9800; color:white; }
  .gray { background:#757575; color:white; }

  /* KONTENERY SEKCJI */
  .section-card {
    background: white;
    margin: 10px auto;
    padding: 20px;
    border-radius: 15px;
    display: none; /* Ukryte na start */
    max-width: 500px;
  }

  input {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    font-size: 18px;
    border: 1px solid #ccc;
    border-radius: 10px;
    box-sizing: border-box;
  }

  #reader { width: 100%; max-width: 500px; margin: 0 auto; border-radius: 15px; overflow: hidden; }
</style>
</head>

<body>

<h2>📋 Biuro zawodów</h2>

<!-- MENU GŁÓWNE -->
<div id="main-menu">
  <button class="menu-btn blue" onclick="wlaczSkaner()">📷 SKANUJ KOD</button>
  <button class="menu-btn green" onclick="pokazSekcje('sekcja-nowy')">➕ NOWY ZAWODNIK</button>
  <button class="menu-btn gray" onclick="pokazSekcje('sekcja-szukaj')">🔍 SZUKAJ (DUMMY)</button>
</div>

<!-- SEKCJA SKANERA -->
<div id="sekcja-skanowania" class="section-card">
  <button class="menu-btn gray" onclick="wylaczWszystko()">⬅ WRÓĆ DO MENU</button>
  <div id="reader"></div>
  <div id="wynik-skanu"></div>
</div>

<!-- SEKCJA EDYCJI (POJAWIA SIĘ PO SKANIE) -->
<div id="edycja" class="section-card">
  <h3>✏️ Edycja zawodnika</h3>
  <input id="e_imie">
  <input id="e_nazwisko">
  <input id="e_rocznik">
  <input id="e_konkurencje">
  <button class="menu-btn green" onclick="zapiszEdycje()">💾 ZAPISZ</button>
</div>

<!-- SEKCJA NOWY ZAWODNIK -->
<div id="sekcja-nowy" class="section-card">
  <button class="menu-btn gray" onclick="wylaczWszystko()">⬅ WRÓĆ</button>
  <h3>Dodaj zawodnika</h3>
  <input id="imie" placeholder="Imię">
  <input id="nazwisko" placeholder="Nazwisko">
  <input id="rocznik" placeholder="Rocznik">
  <input id="konkurencje" placeholder="Konkurencje">
  <button class="menu-btn green" onclick="dodaj()">DODAJ</button>
</div>

<!-- SEKCJA SZUKAJ -->
<div id="sekcja-szukaj" class="section-card">
  <button class="menu-btn gray" onclick="wylaczWszystko()">⬅ WRÓĆ</button>
  <p>Wyszukiwarka w budowie...</p>
</div>

<script>
const API_URL = "TU_WKLEJ_URL";
let currentId = null;
let html5QrCode = null;

// Funkcja przełączająca widoki
function pokazSekcje(id) {
  wylaczWszystko();
  document.getElementById(id).style.display = 'block';
  document.getElementById('main-menu').style.display = 'none';
}

function wylaczWszystko() {
  document.querySelectorAll('.section-card').forEach(s => s.style.display = 'none');
  document.getElementById('main-menu').style.display = 'block';
  if (html5QrCode && html5QrCode.isScanning) {
    html5QrCode.stop();
  }
}

// Logika skanera z Twojego pierwszego (działającego) kodu
function wlaczSkaner() {
  pokazSekcje('sekcja-skanowania');
  
  if (!html5QrCode) {
    html5QrCode = new Html5Qrcode("reader");
  }

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess
  ).catch(err => alert("Błąd kamery: " + err));
}

function onScanSuccess(id) {
  html5QrCode.stop();
  
  fetch(API_URL + "?id=" + id)
    .then(res => res.text())
    .then(text => {
      if (text === "NOT_FOUND") {
        alert("Nie znaleziono");
        wylaczWszystko();
        return;
      }

      const d = JSON.parse(text);
      currentId = d.id;

      // Pokaż wynik i edycję
      document.getElementById("edycja").style.display = "block";
      document.getElementById("wynik-skanu").innerHTML = `
        <div class="section-card" style="display:block; border: 2px solid #4CAF50;">
          <h3>${d.imie} ${d.nazwisko}</h3>
          <button class="menu-btn green" onclick="checkin()">✔ WYDAJ PAKIET</button>
        </div>
      `;

      document.getElementById("e_imie").value = d.imie;
      document.getElementById("e_nazwisko").value = d.nazwisko;
      document.getElementById("e_rocznik").value = d.rocznik;
      document.getElementById("e_konkurencje").value = d.konkurencje;
    });
}

// Funkcje API (identyczne jak w oryginale)
function checkin() {
  fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "checkin", id: currentId }) })
    .then(() => { alert("✅ Pakiet wydany"); wylaczWszystko(); });
}

function zapiszEdycje() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "edit", id: currentId,
      imie: document.getElementById("e_imie").value,
      nazwisko: document.getElementById("e_nazwisko").value,
      rocznik: document.getElementById("e_rocznik").value,
      konkurencje: document.getElementById("e_konkurencje").value
    })
  }).then(() => { alert("💾 Zapisano"); wylaczWszystko(); });
}

function dodaj() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "add",
      imie: document.getElementById("imie").value,
      nazwisko: document.getElementById("nazwisko").value,
      rocznik: document.getElementById("rocznik").value,
      konkurencje: document.getElementById("konkurencje").value
    })
  }).then(res => res.json()).then(() => { alert("Dodano!"); wylaczWszystko(); });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biuro zawodów</title>
<script src="https://unpkg.com"></script>

<style>
  body { font-family: sans-serif; text-align: center; background:#f2f2f2; margin: 0; padding: 15px; }
  
  /* DUŻE PRZYCISKI */
  .btn-big {
    width: 100%;
    padding: 22px;
    margin: 10px 0;
    font-size: 20px;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 3px 6px rgba(0,0,0,0.1);
  }

  .blue { background:#2196F3; color:white; }
  .green { background:#4CAF50; color:white; }
  .orange { background:#ff9800; color:white; }
  .gray { background:#757575; color:white; }

  .card {
    background:white;
    margin: 15px 0;
    padding: 20px;
    border-radius: 15px;
    display: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  input {
    width: 90%;
    padding: 15px;
    margin: 8px 0;
    font-size: 18px;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box;
  }

  /* KONTENER SKANERA */
  #reader { 
    width: 100%; 
    max-width: 500px; 
    margin: 10px auto; 
    background: #eee; 
    border-radius: 10px;
    min-height: 250px; /* Rezerwuje miejsce, by skaner "miał gdzie wejść" */
  }
</style>
</head>

<body>

<h2>📋 Biuro zawodów</h2>

<!-- MENU -->
<div id="menu">
  <button class="btn-big blue" onclick="startScan()">📷 SKANUJ KOD</button>
  <button class="btn-big green" onclick="pokazSekcje('sekcja-nowy')">➕ NOWY ZAWODNIK</button>
  <button class="btn-big gray" onclick="pokazSekcje('sekcja-szukaj')">🔍 SZUKAJ</button>
</div>

<!-- MIEJSCE NA SKANER -->
<div id="reader-container" style="display:none;">
  <div id="reader"></div>
  <button class="btn-big gray" onclick="stopScan()">❌ Zamknij kamerę</button>
</div>

<!-- DANE ZAWODNIKA -->
<div id="zawodnik" class="card"></div>

<!-- FORMULARZ EDYCJI -->
<div id="edycja" class="card">
  <h3>✏️ Edycja zawodnika</h3>
  <input id="e_imie">
  <input id="e_nazwisko">
  <input id="e_rocznik">
  <input id="e_konkurencje">
  <button class="btn-big green" onclick="zapiszEdycje()">💾 ZAPISZ ZMIANY</button>
</div>

<!-- SEKCJA: NOWY ZAWODNIK -->
<div id="sekcja-nowy" class="card">
  <h3>➕ Dodaj zawodnika</h3>
  <input id="imie" placeholder="Imię">
  <input id="nazwisko" placeholder="Nazwisko">
  <input id="rocznik" placeholder="Rocznik">
  <input id="konkurencje" placeholder="Konkurencje">
  <button class="btn-big green" onclick="dodaj()">DODAJ TERAZ</button>
  <button class="btn-big gray" onclick="ukryjWszystko()">POWRÓT</button>
</div>

<!-- SEKCJA: SZUKAJ -->
<div id="sekcja-szukaj" class="card">
  <h3>🔍 Szukaj zawodnika</h3>
  <p>(Opcja dummy - wkrótce dostępna)</p>
  <button class="btn-big gray" onclick="ukryjWszystko()">POWRÓT</button>
</div>

<script>
const API_URL = "TU_WKLEJ_URL";
let currentId = null;
let scanner = null;

function ukryjWszystko() {
  document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
  document.getElementById('reader-container').style.display = 'none';
}

function pokazSekcje(id) {
  ukryjWszystko();
  document.getElementById(id).style.display = 'block';
  if (scanner) stopScan();
}

async function startScan() {
  ukryjWszystko();
  document.getElementById('reader-container').style.display = 'block';
  
  // Małe opóźnienie, żeby przeglądarka "wyrenderowała" div zanim skaner spróbuje go przejąć
  setTimeout(() => {
    if (!scanner) {
      scanner = new Html5Qrcode("reader");
    }

    const config = { fps: 10, qrbox: { width: 250, height: 250 } };

    scanner.start({ facingMode: "environment" }, config, onScanSuccess)
      .catch(err => {
        alert("Problem z kamerą: " + err);
        document.getElementById('reader-container').style.display = 'none';
      });
  }, 300);
}

function stopScan() {
  if (scanner && scanner.isScanning) {
    scanner.stop().then(() => {
      document.getElementById('reader-container').style.display = 'none';
    });
  } else {
    document.getElementById('reader-container').style.display = 'none';
  }
}

function onScanSuccess(id) {
  stopScan();
  
  fetch(API_URL + "?id=" + id)
    .then(res => res.text())
    .then(text => {
      if (text === "NOT_FOUND") {
        alert("Nie znaleziono!");
        return;
      }

      const d = JSON.parse(text);
      currentId = d.id;

      const zDiv = document.getElementById("zawodnik");
      zDiv.style.display = "block";
      zDiv.innerHTML = `
        <h2 style="margin:0">${d.imie} ${d.nazwisko}</h2>
        <p>Nr: <b>${d.nr_startowy || "-"}</b></p>
        <button class="btn-big green" onclick="checkin()">✔ WYDAJ PAKIET</button>
        <button class="btn-big orange" onclick="document.getElementById('edycja').style.display='block'">✏️ EDYTUJ DANE</button>
      `;

      document.getElementById("e_imie").value = d.imie;
      document.getElementById("e_nazwisko").value = d.nazwisko;
      document.getElementById("e_rocznik").value = d.rocznik;
      document.getElementById("e_konkurencje").value = d.konkurencje;
    })
    .catch(e => alert("Błąd pobierania danych"));
}

function checkin() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "checkin", id: currentId })
  }).then(() => {
    alert("✅ Pakiet wydany");
    ukryjWszystko();
  });
}

function zapiszEdycje() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "edit",
      id: currentId,
      imie: document.getElementById("e_imie").value,
      nazwisko: document.getElementById("e_nazwisko").value,
      rocznik: document.getElementById("e_rocznik").value,
      konkurencje: document.getElementById("e_konkurencje").value
    })
  }).then(() => {
    alert("💾 Zapisano");
    ukryjWszystko();
  });
}

function dodaj() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "add",
      imie: document.getElementById("imie").value,
      nazwisko: document.getElementById("nazwisko").value,
      rocznik: document.getElementById("rocznik").value,
      konkurencje: document.getElementById("konkurencje").value
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("Dodano zawodnika!");
    ukryjWszystko();
    document.querySelectorAll('#sekcja-nowy input').forEach(i => i.value = "");
  });
}
</script>

</body>
</html>

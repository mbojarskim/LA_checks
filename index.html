<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biuro Zawodów</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f2f2f2; margin: 0; padding: 0; }
        .card { background: white; margin: 15px auto; padding: 15px; border-radius: 10px; width: 90%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { width: 90%; padding: 16px; margin: 8px 0; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; }
        input { width: 85%; padding: 12px; margin: 8px 0; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        
        .blue { background: #2196F3; color: white; }
        .green { background: #4CAF50; color: white; }
        .orange { background: #ff9800; color: white; }
        .red { background: #f44336; color: white; }
        .gray { background: #9e9e9e; color: white; }

        #menu { display: flex; flex-direction: column; height: 100vh; }
        .tile { flex: 1; font-size: 24px; font-weight: bold; border-radius: 0; margin: 0; }
        
        #app-content { display: none; padding-top: 10px; }
        #reader { width: 100%; max-width: 400px; margin: 0 auto; }
        .status-badge { font-weight: bold; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>

<!-- GŁÓWNE MENU -->
<div id="menu">
    <button class="tile blue" onclick="showSection('scan')">📷 SKANUJ KOD QR</button>
    <button class="tile green" onclick="showSection('search')">🔎 SZUKAJ NAZWISKA</button>
    <button class="tile orange" onclick="showSection('add')">➕ DODAJ NOWEGO</button>
</div>

<!-- TREŚĆ APLIKACJI (UKRYTA NA START) -->
<div id="app-content">
    <button class="gray" onclick="backToMenu()">🏠 POWRÓT DO MENU</button>

    <!-- SEKTCJA: SKANOWANIE -->
    <div id="sec-scan" style="display:none;">
        <div id="reader"></div>
    </div>

    <!-- SEKCJA: WYSZUKIWANIE -->
    <div id="sec-search" style="display:none;" class="card">
        <h3>🔎 Szukaj zawodnika</h3>
        <input type="text" id="input-szukaj" placeholder="Wpisz nazwisko...">
        <button class="blue" onclick="wykonajSzukaj()">Szukaj</button>
    </div>

    <!-- SEKCJA: DODAWANIE -->
    <div id="sec-add" style="display:none;" class="card">
        <h3>➕ Nowy zawodnik</h3>
        <input id="new-imie" placeholder="Imię">
        <input id="new-nazwisko" placeholder="Nazwisko">
        <input id="new-rocznik" placeholder="Rocznik">
        <input id="new-konkurencje" placeholder="Konkurencje">
        <input id="new-nr" placeholder="Numer startowy">
        <button class="green" onclick="dodajZawodnika()">Zapisz w bazie</button>
    </div>

    <!-- WYNIKI I PROFIL ZAWODNIKA -->
    <div id="wyniki-kontener" style="display:none;"></div>
    
    <div id="profil-zawodnika" class="card" style="display:none;">
        <div id="profil-dane"></div>
        <hr>
        <div id="edycja-form" style="display:none;">
            <h4>Edycja danych</h4>
            <input id="edit-imie">
            <input id="edit-nazwisko">
            <input id="edit-rocznik">
            <input id="edit-konkurencje">
            <button class="green" onclick="zapiszEdycje()">Zatwierdź zmiany</button>
        </div>
    </div>
</div>

<script>
// !!! PODMIEŃ TEN LINK NA SWÓJ Z GOOGLE APPS SCRIPT !!!
const API_URL = "https://script.google.com/macros/s/AKfycbyCa1bGgo4CarwRp3JjYYwML3SQghse-MvQxEjByvlXj8SLP5eXrPC-NZduQizwLgMx/exec";

let currentId = null;
let html5QrCode = null;

// NAWIGACJA
function showSection(section) {
    document.getElementById("menu").style.display = "none";
    document.getElementById("app-content").style.display = "block";
    
    // Ukryj wszystkie sekcje
    ["sec-scan", "sec-search", "sec-add", "profil-zawodnika", "wyniki-kontener"].forEach(id => {
        document.getElementById(id).style.display = "none";
    });

    // Pokaż wybraną
    if(section === 'scan') {
        document.getElementById("sec-scan").style.display = "block";
        startScanner();
    } else if(section === 'search') {
        document.getElementById("sec-search").style.display = "block";
    } else if(section === 'add') {
        document.getElementById("sec-add").style.display = "block";
    }
}

function backToMenu() {
    if(html5QrCode) html5QrCode.stop().catch(() => {});
    document.getElementById("menu").style.display = "flex";
    document.getElementById("app-content").style.display = "none";
}

// SKANOWANIE
async function startScanner() {
    // 1. Jeśli skaner już istnieje, spróbuj go zatrzymać i wyczyścić
    if (html5QrCode) {
        try {
            await html5QrCode.stop();
        } catch (e) {
            // Ignoruj błąd jeśli nie był uruchomiony
        }
        document.getElementById("reader").innerHTML = ""; // Czyścimy kontener
    }

    // 2. Tworzymy nową instancję
    html5QrCode = new Html5Qrcode("reader");

    // 3. Uruchamiamy
    html5QrCode.start(
        { facingMode: "environment" },
        { 
            fps: 10, 
            qrbox: { width: 250, height: 250 } // Nowy format zapisu boxa
        },
        (decodedText) => {
            html5QrCode.stop().then(() => {
                pobierzDane(decodedText);
            });
        },
        (errorMessage) => {
            // Opcjonalne: logowanie błędów w konsoli (nie alertować, bo sypie nimi co klatkę)
            console.log("Skanowanie...");
        }
    ).catch(err => {
        alert("Błąd: Upewnij się, że używasz HTTPS i dałeś dostęp do kamery. " + err);
    });
}

// POBIERANIE DANYCH
function pobierzDane(id) {
    fetch(`${API_URL}?id=${id}`)
    .then(r => r.json())
    .then(d => {
        if(d === "NOT_FOUND") return alert("Nie znaleziono zawodnika!");
        wyswietlProfil(d);
    });
}

function wyswietlProfil(d) {
    currentId = d.id;
    const profil = document.getElementById("profil-zawodnika");
    const dane = document.getElementById("profil-dane");
    
    profil.style.display = "block";
    document.getElementById("wyniki-kontener").style.display = "none";
    document.getElementById("edycja-form").style.display = "none";

    const statusPakiet = d.pakiet === "TAK" 
        ? '<span class="status-badge red">PAKIET ODEBRANY</span>' 
        : '<span class="status-badge green">DO ODBIORU</span>';

    dane.innerHTML = `
        <h2>${d.imie} ${d.nazwisko}</h2>
        <p><strong>Numer:</strong> ${d.nr_startowy || "---"}</p>
        <p><strong>Rocznik:</strong> ${d.rocznik}</p>
        <p><strong>Konkurencje:</strong> ${d.konkurencje}</p>
        <p><strong>Status:</strong> ${statusPakiet}</p>
        ${d.pakiet !== "TAK" ? `<button class="green" onclick="wydajPakiet()">✔ WYDAJ PAKIET</button>` : ''}
        <button class="orange" onclick="document.getElementById('edycja-form').style.display='block'">✏ EDYTUJ DANE</button>
    `;

    // Wypełnij pola edycji
    document.getElementById("edit-imie").value = d.imie;
    document.getElementById("edit-nazwisko").value = d.nazwisko;
    document.getElementById("edit-rocznik").value = d.rocznik;
    document.getElementById("edit-konkurencje").value = d.konkurencje;
}

// WYSZUKIWANIE
function wykonajSzukaj() {
    const txt = document.getElementById("input-szukaj").value;
    if(txt.length < 3) return alert("Wpisz minimum 3 znaki");

    fetch(`${API_URL}?search=${encodeURIComponent(txt)}`)
    .then(r => r.json())
    .then(list => {
        const kontener = document.getElementById("wyniki-kontener");
        kontener.style.display = "block";
        kontener.innerHTML = "<h4>Wyniki wyszukiwania:</h4>";
        
        if(list.length === 0) kontener.innerHTML += "Brak wyników.";

        list.forEach(z => {
            kontener.innerHTML += `
                <div class="card" onclick="pobierzDane('${z.id}')" style="cursor:pointer; border:1px solid #2196F3">
                    <strong>${z.imie} ${z.nazwisko}</strong><br>
                    <small>Nr: ${z.nr_startowy} | ${z.konkurencje}</small>
                </div>
            `;
        });
    });
}

// AKCJE POST
function wydajPakiet() {
    if(!confirm("Czy na pewno wydać pakiet?")) return;
    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "checkin", id: currentId })
    }).then(() => {
        alert("Pakiet odznaczony!");
        pobierzDane(currentId);
    });
}

function zapiszEdycje() {
    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            action: "edit",
            id: currentId,
            imie: document.getElementById("edit-imie").value,
            nazwisko: document.getElementById("edit-nazwisko").value,
            rocznik: document.getElementById("edit-rocznik").value,
            konkurencje: document.getElementById("edit-konkurencje").value
        })
    }).then(() => {
        alert("Dane zaktualizowane");
        pobierzDane(currentId);
    });
}

function dodajZawodnika() {
    const data = {
        action: "add",
        imie: document.getElementById("new-imie").value,
        nazwisko: document.getElementById("new-nazwisko").value,
        rocznik: document.getElementById("new-rocznik").value,
        konkurencje: document.getElementById("new-konkurencje").value,
        nr_startowy: document.getElementById("new-nr").value
    };

    fetch(API_URL, { method: "POST", body: JSON.stringify(data) })
    .then(() => {
        alert("Zawodnik dodany do bazy!");
        backToMenu();
    });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biuro zawodów</title>
<script src="https://unpkg.com"></script>

<style>
  body { font-family: Arial; text-align: center; background:#f2f2f2; margin:0; padding:10px; }

  /* TWOJE NOWE DUŻE PRZYCISKI */
  .btn-big {
    width: 100%;
    padding: 25px;
    margin: 10px 0;
    font-size: 22px;
    font-weight: bold;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    display: block;
  }

  .green { background:#4CAF50; color:white; }
  .blue { background:#2196F3; color:white; }
  .orange { background:#ff9800; color:white; }
  .gray { background:#757575; color:white; }

  .card { background:white; margin:10px 0; padding:20px; border-radius:15px; display: none; }
  input { width:90%; padding:15px; margin:8px; font-size:18px; border:1px solid #ccc; border-radius:10px; }
  
  #reader { width: 100%; border-radius: 15px; overflow: hidden; background: black; }
</style>
</head>

<body>

<h2>📋 Biuro zawodów 1.5</h2>

<!-- GŁÓWNE MENU -->
<div id="menu">
  <button class="btn-big blue" onclick="startScan()">📷 SKANUJ ZAWODNIKA</button>
  <button class="btn-big green" onclick="pokazSekcje('sekcja-nowy')">➕ NOWY ZAWODNIK</button>
  <button class="btn-big gray" onclick="pokazSekcje('sekcja-szukaj')">🔍 SZUKAJ</button>
</div>

<!-- MIEJSCE NA SKANER -->
<div id="reader"></div>

<!-- DANE ZAWODNIKA (PO SKANIE) -->
<div id="zawodnik" class="card"></div>

<!-- EDYCJA -->
<div id="edycja" class="card">
  <h3>Edycja zawodnika</h3>
  <input id="e_imie"> <input id="e_nazwisko"> <input id="e_rocznik"> <input id="e_konkurencje">
  <button class="btn-big green" onclick="zapiszEdycje()">💾 Zapisz</button>
</div>

<!-- NOWY ZAWODNIK -->
<div id="sekcja-nowy" class="card">
  <h3>➕ Nowy zawodnik</h3>
  <input id="imie" placeholder="Imię">
  <input id="nazwisko" placeholder="Nazwisko">
  <input id="rocznik" placeholder="Rocznik">
  <input id="konkurencje" placeholder="Konkurencje">
  <button class="btn-big green" onclick="dodaj()">Dodaj teraz</button>
  <button class="btn-big gray" onclick="ukryjWszystko()">Wróć</button>
</div>

<!-- SZUKAJ -->
<div id="sekcja-szukaj" class="card">
  <h3>🔍 Szukaj</h3>
  <p>Opcja dummy...</p>
  <button class="btn-big gray" onclick="ukryjWszystko()">Wróć</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyCa1bGgo4CarwRp3JjYYwML3SQghse-MvQxEjByvlXj8SLP5eXrPC-NZduQizwLgMx/exec";
let currentId = null;
let html5QrCode = null;

function ukryjWszystko() {
  document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
  // Nie czyścimy #reader, żeby nie psuć biblioteki
}

function pokazSekcje(id) {
  ukryjWszystko();
  document.getElementById(id).style.display = 'block';
  if (html5QrCode && html5QrCode.isScanning) {
     html5QrCode.stop();
  }
}

// TWOJA ORYGINALNA FUNKCJA SKANOWANIA (Lekko poprawiona)
function startScan() {
  ukryjWszystko();
  
  if (!html5QrCode) {
    html5QrCode = new Html5Qrcode("reader");
  }

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess
  ).catch(err => {
      console.error(err);
      alert("Kamera nie ruszyła. Odśwież stronę.");
  });
}

function onScanSuccess(id) {
  html5QrCode.stop().then(() => {
    fetch(API_URL + "?id=" + id)
      .then(res => res.text())
      .then(text => {
        if (text === "NOT_FOUND") { alert("Nie znaleziono"); return; }
        const d = JSON.parse(text);
        currentId = d.id;

        const z = document.getElementById("zawodnik");
        z.style.display = "block";
        z.innerHTML = `
          <h3>${d.imie} ${d.nazwisko}</h3>
          Nr: ${d.nr_startowy || "-"}<br><br>
          <button class="btn-big green" onclick="checkin()">✔ WYDAJ PAKIET</button>
          <button class="btn-big orange" onclick="document.getElementById('edycja').style.display='block'">✏️ EDYTUJ</button>
        `;
        document.getElementById("e_imie").value = d.imie;
        document.getElementById("e_nazwisko").value = d.nazwisko;
        document.getElementById("e_rocznik").value = d.rocznik;
        document.getElementById("e_konkurencje").value = d.konkurencje;
      });
  });
}

// POZOSTAŁE FUNKCJE
function checkin() {
  fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "checkin", id: currentId }) })
  .then(() => { alert("✅ Wydano"); ukryjWszystko(); });
}

function zapiszEdycje() {
  fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "edit", id: currentId, imie: document.getElementById("e_imie").value, nazwisko: document.getElementById("e_nazwisko").value, rocznik: document.getElementById("e_rocznik").value, konkurencje: document.getElementById("e_konkurencje").value }) })
  .then(() => { alert("💾 Zapisano"); ukryjWszystko(); });
}

function dodaj() {
  fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "add", imie: document.getElementById("imie").value, nazwisko: document.getElementById("nazwisko").value, rocznik: document.getElementById("rocznik").value, konkurencje: document.getElementById("konkurencje").value }) })
  .then(res => res.json())
  .then(data => { alert("Dodano!"); ukryjWszystko(); });
}
</script>
</body>
</html>

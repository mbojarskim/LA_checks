<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biuro zawodów</title>
<script src="https://unpkg.com"></script>

<style>
  body { font-family: Arial, sans-serif; text-align: center; background:#f2f2f2; margin: 0; padding: 15px; }
  
  /* DUŻE PRZYCISKI MENU */
  .btn-big {
    width: 100%;
    padding: 25px;
    margin: 10px 0;
    font-size: 22px;
    font-weight: bold;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    display: block;
  }

  .blue { background:#2196F3; color:white; }
  .green { background:#4CAF50; color:white; }
  .orange { background:#ff9800; color:white; }
  .gray { background:#757575; color:white; }

  .card {
    background:white;
    margin: 15px 0;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    display: none; /* Domyślnie ukryte */
  }

  input {
    width: 90%;
    padding: 15px;
    margin: 8px 0;
    font-size: 18px;
    border: 1px solid #ccc;
    border-radius: 8px;
  }

  #reader { width: 100%; margin-top: 10px; border-radius: 10px; overflow: hidden; }
</style>
</head>

<body>

<h2>📋 Biuro zawodów 2.0</h2>

<!-- GŁÓWNE PRZYCISKI -->
<button class="btn-big blue" onclick="startScan()">📷 SKANUJ ZAWODNIKA</button>
<button class="btn-big green" onclick="pokazSekcje('sekcja-nowy')">➕ NOWY ZAWODNIK</button>
<button class="btn-big gray" onclick="pokazSekcje('sekcja-szukaj')">🔍 SZUKAJ (DUMMY)</button>

<!-- MIEJSCE NA SKANER -->
<div id="reader"></div>

<!-- DANE ZAWODNIKA (PO SKANOWANIU) -->
<div id="zawodnik" class="card"></div>

<!-- FORMULARZ EDYCJI -->
<div id="edycja" class="card">
  <h3>✏️ Edycja zawodnika</h3>
  <input id="e_imie" placeholder="Imię">
  <input id="e_nazwisko" placeholder="Nazwisko">
  <input id="e_rocznik" placeholder="Rocznik">
  <input id="e_konkurencje" placeholder="Konkurencje">
  <button class="btn-big green" onclick="zapiszEdycje()">💾 ZAPISZ ZMIANY</button>
</div>

<!-- SEKCJA: NOWY ZAWODNIK -->
<div id="sekcja-nowy" class="card">
  <h3>➕ Dodaj zawodnika</h3>
  <input id="imie" placeholder="Imię">
  <input id="nazwisko" placeholder="Nazwisko">
  <input id="rocznik" placeholder="Rocznik">
  <input id="konkurencje" placeholder="Konkurencje">
  <button class="btn-big green" onclick="dodaj()">DODAJ</button>
  <button class="btn-big gray" onclick="this.parentElement.style.display='none'">ANULUJ</button>
</div>

<!-- SEKCJA: SZUKAJ -->
<div id="sekcja-szukaj" class="card">
  <h3>🔍 Wyszukiwarka</h3>
  <p>Opcja w trakcie przygotowania...</p>
  <button class="btn-big gray" onclick="this.parentElement.style.display='none'">ZAMKNIJ</button>
</div>

<script>
const API_URL = "TU_WKLEJ_URL";
let currentId = null;
let scanner = null;

// Funkcja pomocnicza do pokazania sekcji i ukrycia innych
function pokazSekcje(id) {
  document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
  document.getElementById(id).style.display = 'block';
  // Jeśli skaner był włączony, nie ruszamy go, chyba że chcesz go wyłączyć przy zmianie sekcji
}

function startScan() {
  // Czyścimy poprzednie wyniki
  document.getElementById("zawodnik").style.display = "none";
  document.getElementById("edycja").style.display = "none";
  
  if (!scanner) {
    scanner = new Html5Qrcode("reader");
  }

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess
  ).catch(err => alert("Błąd kamery: " + err));
}

function onScanSuccess(id) {
  scanner.stop();
  
  fetch(API_URL + "?id=" + id)
    .then(res => res.text())
    .then(text => {
      if (text === "NOT_FOUND") {
        alert("Nie znaleziono zawodnika");
        return;
      }

      const d = JSON.parse(text);
      currentId = d.id;

      const zDiv = document.getElementById("zawodnik");
      zDiv.style.display = "block";
      zDiv.innerHTML = `
        <h3>${d.imie} ${d.nazwisko}</h3>
        <p>Nr: ${d.nr_startowy || "-"}</p>
        <button class="btn-big green" onclick="checkin()">✔ WYDAJ PAKIET</button>
        <button class="btn-big orange" onclick="document.getElementById('edycja').style.display='block'">✏️ EDYTUJ</button>
      `;

      // Wypełnij edycję
      document.getElementById("e_imie").value = d.imie;
      document.getElementById("e_nazwisko").value = d.nazwisko;
      document.getElementById("e_rocznik").value = d.rocznik;
      document.getElementById("e_konkurencje").value = d.konkurencje;
    });
}

function checkin() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "checkin", id: currentId })
  }).then(() => alert("✅ Pakiet wydany"));
}

function zapiszEdycje() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "edit",
      id: currentId,
      imie: document.getElementById("e_imie").value,
      nazwisko: document.getElementById("e_nazwisko").value,
      rocznik: document.getElementById("e_rocznik").value,
      konkurencje: document.getElementById("e_konkurencje").value
    })
  }).then(() => {
    alert("💾 Zapisano");
    document.getElementById("edycja").style.display = "none";
  });
}

function dodaj() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "add",
      imie: document.getElementById("imie").value,
      nazwisko: document.getElementById("nazwisko").value,
      rocznik: document.getElementById("rocznik").value,
      konkurencje: document.getElementById("konkurencje").value
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("Dodano ID: " + data.id);
    document.getElementById("sekcja-nowy").style.display = "none";
  });
}
</script>

</body>
</html>

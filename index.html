<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Biuro zawodów</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  body { font-family: Arial; text-align: center; background:#f2f2f2; margin: 0; padding: 10px; }
  button { width: 90%; padding: 18px; margin: 8px; font-size: 20px; border: none; border-radius: 10px; cursor: pointer; }
  
  .green { background:#4CAF50; color:white; }
  .blue { background:#2196F3; color:white; }
  .orange { background:#ff9800; color:white; }
  .gray { background:#757575; color:white; }

  .card { background:white; margin:10px auto; padding:15px; border-radius:10px; max-width: 500px; display: none; }
  input { width:90%; padding:12px; margin:5px; font-size:16px; border: 1px solid #ccc; border-radius: 5px; }
  #menu { margin-bottom: 20px; }
</style>
</head>

<body>

<h2>📋 Biuro zawodów</h2>

<!-- GŁÓWNE MENU -->
<div id="menu">
  <button class="blue" onclick="pokazSekcje('sekcja-skanuj')">📷 Skanuj</button>
  <button class="green" onclick="pokazSekcje('sekcja-nowy')">➕ Nowy zawodnik</button>
  <button class="gray" onclick="pokazSekcje('sekcja-szukaj')">🔍 Szukaj (dummy)</button>
</div>

<!-- SEKCJA: SKANOWANIE -->
<div id="sekcja-skanuj" class="card">
  <div id="reader"></div>
  <div id="zawodnik" style="margin-top:20px;"></div>
</div>

<!-- SEKCJA: NOWY ZAWODNIK -->
<div id="sekcja-nowy" class="card">
  <h3>Dodaj nowego zawodnika</h3>
  <input id="imie" placeholder="Imię"><br>
  <input id="nazwisko" placeholder="Nazwisko"><br>
  <input id="rocznik" placeholder="Rocznik"><br>
  <input id="konkurencje" placeholder="Konkurencje"><br>
  <button class="green" onclick="dodaj()">Zapisz zawodnika</button>
</div>

<!-- SEKCJA: SZUKAJ (DUMMY) -->
<div id="sekcja-szukaj" class="card">
  <h3>Wyszukiwarka</h3>
  <p>Opcja szukaj będzie dostępna wkrótce...</p>
</div>

<!-- MODAL EDYCJI (UKRYTY) -->
<div id="edycja" class="card">
  <h3>Edycja zawodnika</h3>
  <input id="e_imie"><br>
  <input id="e_nazwisko"><br>
  <input id="e_rocznik"><br>
  <input id="e_konkurencje"><br>
  <button class="green" onclick="zapiszEdycje()">💾 Zapisz zmiany</button>
  <button class="gray" onclick="this.parentElement.style.display='none'">Anuluj</button>
</div>

<script>
const API_URL = "TU_WKLEJ_URL";
let currentId = null;
let scanner = null;

// FUNKCJA PRZEŁĄCZANIA SEKCJI
function pokazSekcje(idSekcji) {
  // Ukryj wszystkie sekcje
  document.querySelectorAll('.card').forEach(card => card.style.display = 'none');
  
  // Zatrzymaj skaner jeśli zmieniamy sekcję
  if (scanner && idSekcji !== 'sekcja-skanuj') {
    scanner.stop().catch(err => console.log(err));
  }

  // Pokaż wybraną
  document.getElementById(idSekcji).style.display = "block";

  // Jeśli wybrano skanowanie, odpal kamerę od razu
  if (idSekcji === 'sekcja-skanuj') {
    startScan();
  }
}

function startScan() {
  if (!scanner) {
    scanner = new Html5Qrcode("reader");
  }
  
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess
  ).catch(err => alert("Błąd kamery: " + err));
}

function onScanSuccess(id) {
  scanner.stop();
  fetch(API_URL + "?id=" + id)
    .then(res => res.text())
    .then(text => {
      if (text === "NOT_FOUND") {
        alert("Nie znaleziono");
        return;
      }
      const d = JSON.parse(text);
      currentId = d.id;
      
      const info = document.getElementById("zawodnik");
      info.innerHTML = `
        <div style="border-top: 2px solid #eee; padding-top: 10px;">
          <h3>${d.imie} ${d.nazwisko}</h3>
          Nr: ${d.nr_startowy || "-"}<br>
          Rocznik: ${d.rocznik}<br>
          <button class="green" onclick="checkin()">✔ Wydaj pakiet</button>
          <button class="orange" onclick="pokazEdycje('${d.imie}', '${d.nazwisko}', '${d.rocznik}', '${d.konkurencje}')">✏️ Edytuj</button>
        </div>
      `;

      document.getElementById("e_imie").value = d.imie;
      document.getElementById("e_nazwisko").value = d.nazwisko;
      document.getElementById("e_rocznik").value = d.rocznik;
      document.getElementById("e_konkurencje").value = d.konkurencje;
    });
}

function pokazEdycje() {
  document.getElementById("edycja").style.display = "block";
  window.scrollTo(0, document.body.scrollHeight);
}

function checkin() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "checkin", id: currentId })
  }).then(() => alert("✅ Pakiet wydany"));
}

function zapiszEdycje() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "edit",
      id: currentId,
      imie: document.getElementById("e_imie").value,
      nazwisko: document.getElementById("e_nazwisko").value,
      rocznik: document.getElementById("e_rocznik").value,
      konkurencje: document.getElementById("e_konkurencje").value
    })
  }).then(() => {
    alert("💾 Zapisano");
    document.getElementById("edycja").style.display = "none";
  });
}

function dodaj() {
  const dane = {
    action: "add",
    imie: document.getElementById("imie").value,
    nazwisko: document.getElementById("nazwisko").value,
    rocznik: document.getElementById("rocznik").value,
    konkurencje: document.getElementById("konkurencje").value
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(dane)
  })
  .then(res => res.json())
  .then(data => {
    alert("Dodano zawodnika! ID: " + data.id);
    // Czyścimy pola
    document.querySelectorAll('#sekcja-nowy input').forEach(i => i.value = "");
  });
}
</script>

</body>
</html>

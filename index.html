<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Obsługa Pakietów - Zawody</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        
        body {
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 24px;
        }
        
        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 0.5rem;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .sub {
            color: #475569;
            border-left: 4px solid #3b82f6;
            padding-left: 12px;
            margin-bottom: 24px;
        }
        
        .scan-area {
            background: #f8fafc;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border: 2px dashed #cbd5e1;
            margin-bottom: 24px;
        }
        
        #reader {
            width: 100%;
            max-width: 400px;
            margin: 12px auto;
            min-height: 300px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
        }
        
        #reader video {
            width: 100% !important;
            height: auto !important;
        }
        
        button {
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            margin: 6px;
            transition: 0.2s;
        }
        
        button:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }
        
        button.secondary {
            background: #64748b;
        }
        
        button.warning {
            background: #f97316;
        }
        
        button.success {
            background: #10b981;
        }
        
        button.danger {
            background: #ef4444;
        }
        
        .card {
            background: #f1f5f9;
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .info-label {
            font-weight: 600;
            color: #334155;
        }
        
        .info-value {
            font-weight: 500;
            color: #0f172a;
        }
        
        .package-status {
            background: #e6f7e6;
            border-radius: 40px;
            padding: 8px 16px;
            display: inline-block;
            font-weight: bold;
            color: #2e7d32;
        }
        
        .package-absent {
            background: #ffe6e6;
            color: #c62828;
        }
        
        .edit-group {
            margin: 16px 0;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
            margin-top: 4px;
        }
        
        .flex-btns {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }
        
        .package-btn-container {
            display: flex;
            justify-content: center;
            margin: 20px 0 10px 0;
        }
        
        .package-btn-container button {
            min-width: 200px;
            font-size: 1.1rem;
            padding: 14px 24px;
        }
        
        .alert {
            padding: 12px;
            border-radius: 28px;
            background: #fee2e2;
            color: #b91c1c;
            text-align: center;
            margin: 16px 0;
        }
        
        .alert-success {
            background: #e6f7e6;
            color: #2e7d32;
        }
        
        .debug-info {
            font-size: 0.7rem;
            color: #666;
            margin-top: 10px;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 8px;
            word-break: break-all;
            font-family: monospace;
            max-height: 150px;
            overflow-y: auto;
        }
        
        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #e2e8f0;
        }
        
        .search-result-item {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #e2e8f0;
        }
        
        .search-result-item:hover {
            background: #e2e8f0;
        }
        
        @media (max-width: 500px) {
            .container {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>
        <span>📦</span> 
        <span>Odbiór pakietów</span>
    </h1>
    <div class="sub">Zeskanuj kod QR (ID zawodnika)</div>

    <div class="scan-area">
        <div id="reader"></div>
        <div style="margin-top: 12px;">
            <button id="startScanBtn" class="secondary">📷 Uruchom skaner</button>
            <button id="stopScanBtn" style="display:none;" class="danger">⏹️ Zatrzymaj</button>
        </div>
        <p style="font-size:13px; margin-top:12px;">lub wpisz ID ręcznie:</p>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="manualId" placeholder="np. 123" style="flex: 1;">
            <button id="manualSearchBtn">🔍 Szukaj</button>
        </div>
        
        <hr style="margin: 15px 0;">
        <p style="font-size:13px; font-weight: bold; margin-bottom: 8px;">🔍 Szukaj po nazwisku:</p>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="searchNazwisko" placeholder="Wpisz nazwisko" style="flex: 1;">
            <button id="searchByNazwiskoBtn">🔎 Szukaj</button>
        </div>
        <div id="searchResults" style="display:none; margin-top: 15px; background: white; border-radius: 16px; padding: 12px; max-height: 250px; overflow-y: auto;">
            <div id="resultsList"></div>
        </div>
    </div>

    <div id="resultPanel" style="display:none;">
        <div class="card">
            <h3>🏃 Dane zawodnika</h3>
            <div id="playerInfo"></div>
            
            <div class="package-btn-container">
                <button id="confirmPackageBtn" class="warning">✅ Potwierdź odbiór pakietu</button>
            </div>
            
            <hr>
            
            <div class="edit-group">
                <h4>✏️ Edycja danych</h4>
                <div class="info-row">
                    <span class="info-label">Imię:</span>
                    <input type="text" id="editImie" placeholder="Imię">
                </div>
                <div class="info-row">
                    <span class="info-label">Nazwisko:</span>
                    <input type="text" id="editNazwisko" placeholder="Nazwisko">
                </div>
                <div class="info-row">
                    <span class="info-label">Rocznik:</span>
                    <input type="text" id="editRocznik" placeholder="Rocznik">
                </div>
                <div class="info-row">
                    <span class="info-label">Konkurencja 1:</span>
                    <input type="text" id="editKonk1" placeholder="Konkurencja 1">
                </div>
                <div class="info-row">
                    <span class="info-label">Konkurencja 2:</span>
                    <input type="text" id="editKonk2" placeholder="Konkurencja 2">
                </div>
                <div class="info-row">
                    <span class="info-label">Numer startowy:</span>
                    <input type="text" id="editNrStartowy" placeholder="Numer startowy">
                </div>
            </div>
            
            <div class="flex-btns">
                <button id="saveEditBtn" class="success">💾 Zapisz zmiany</button>
                <button id="clearBtn" class="secondary">🔄 Wróć do skanowania</button>
            </div>
        </div>
    </div>
    
    <div id="debugPanel" class="debug-info">
        <strong>Debug:</strong> <span id="debugMsg">Gotowy</span>
    </div>
    
    <footer style="font-size: 0.7rem; text-align: center; margin-top: 16px; color: #666;">
        Skieruj aparat na kod QR
    </footer>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
    // ==================== KONFIGURACJA ====================
    // 🔁 ZMIEŃ TEN URL NA SWÓJ Z APPS SCRIPT!
    const API_URL = 'https://script.google.com/macros/s/TWÓJ_URL/exec';
    
    // Zmienne globalne
    let currentRowIndex = null;
    let currentPlayerData = null;
    let html5QrCode = null;
    let isScanning = false;
    
    // Elementy DOM
    const resultPanel = document.getElementById('resultPanel');
    const playerInfoDiv = document.getElementById('playerInfo');
    const debugMsg = document.getElementById('debugMsg');
    
    const editImie = document.getElementById('editImie');
    const editNazwisko = document.getElementById('editNazwisko');
    const editRocznik = document.getElementById('editRocznik');
    const editKonk1 = document.getElementById('editKonk1');
    const editKonk2 = document.getElementById('editKonk2');
    const editNrStartowy = document.getElementById('editNrStartowy');
    
    const startScanBtn = document.getElementById('startScanBtn');
    const stopScanBtn = document.getElementById('stopScanBtn');
    const manualSearchBtn = document.getElementById('manualSearchBtn');
    const saveEditBtn = document.getElementById('saveEditBtn');
    const confirmPackageBtn = document.getElementById('confirmPackageBtn');
    const clearBtn = document.getElementById('clearBtn');
    const manualIdInput = document.getElementById('manualId');
    
    // Elementy do wyszukiwania po nazwisku
    const searchNazwisko = document.getElementById('searchNazwisko');
    const searchByNazwiskoBtn = document.getElementById('searchByNazwiskoBtn');
    const searchResults = document.getElementById('searchResults');
    const resultsList = document.getElementById('resultsList');
    
    // ==================== DŹWIĘK ====================
    function playBeep() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.frequency.value = 880;
            gainNode.gain.value = 0.3;
            
            oscillator.start();
            
            setTimeout(() => {
                oscillator.stop();
                audioCtx.close();
            }, 200);
        } catch(e) {
            console.log('Dźwięk nie jest wspierany:', e);
        }
    }
    
    // ==================== FUNKCJE POMOCNICZE ====================
    function showAlert(msg, isError = true) {
        const oldAlert = document.querySelector('.alert');
        if(oldAlert) oldAlert.remove();
        const alertDiv = document.createElement('div');
        alertDiv.className = isError ? 'alert' : 'alert alert-success';
        alertDiv.innerText = msg;
        document.getElementById('app').insertBefore(alertDiv, resultPanel);
        setTimeout(() => alertDiv.remove(), 4000);
    }
    
    function setDebug(msg) {
        const timestamp = new Date().toLocaleTimeString();
        debugMsg.innerHTML = `[${timestamp}] ${msg}<br>${debugMsg.innerHTML}`;
        if(debugMsg.innerHTML.split('<br>').length > 15) {
            debugMsg.innerHTML = debugMsg.innerHTML.split('<br>').slice(0, 15).join('<br>');
        }
        console.log(msg);
    }
    
    // ==================== POŁĄCZENIE Z APPS SCRIPT ====================
    async function fetchPlayerById(id) {
        try {
            setDebug(`Pobieranie danych dla ID: ${id}`);
            const url = `${API_URL}?id=${encodeURIComponent(id)}&t=${Date.now()}`;
            const response = await fetch(url);
            const text = await response.text();
            setDebug(`Odpowiedź: ${text.substring(0, 150)}`);
            return JSON.parse(text);
        } catch(err) {
            setDebug(`❌ Błąd fetch: ${err.message}`);
            showAlert(`Błąd połączenia: ${err.message}`);
            return null;
        }
    }
    
    async function updatePlayer(updatesObj) {
        if(!currentRowIndex) {
            setDebug('❌ Brak currentRowIndex');
            return false;
        }
        
        try {
            const params = new URLSearchParams();
            params.append('method', 'update');
            params.append('rowIndex', currentRowIndex);
            
            for (let [key, value] of Object.entries(updatesObj)) {
                params.append(key, value);
            }
            params.append('t', Date.now());
            
            const url = `${API_URL}?${params.toString()}`;
            setDebug(`📤 Wysyłam aktualizację: ${url.substring(0, 200)}...`);
            
            const response = await fetch(url);
            const text = await response.text();
            setDebug(`📥 Odpowiedź: ${text}`);
            
            const result = JSON.parse(text);
            
            if(result.success) {
                setDebug(`✅ Aktualizacja udana`);
                showAlert("✅ Zaktualizowano dane!", false);
                return true;
            } else {
                setDebug(`❌ Błąd: ${result.error}`);
                showAlert(`Błąd: ${result.error}`);
                return false;
            }
            
        } catch(err) {
            setDebug(`❌ Błąd: ${err.message}`);
            showAlert(`Błąd: ${err.message}`);
            return false;
        }
    }
    
    // ==================== WYSZUKIWANIE PO NAZWISKU ====================
    async function searchByNazwisko() {
        const nazwisko = searchNazwisko.value.trim();
        
        if (!nazwisko) {
            showAlert("Wprowadź nazwisko do wyszukania");
            return;
        }
        
        setDebug(`🔍 Szukam nazwiska: ${nazwisko}`);
        searchResults.style.display = 'block';
        resultsList.innerHTML = '<div style="text-align:center; padding: 20px;">🔍 Szukam...</div>';
        
        try {
            const url = `${API_URL}?search=nazwisko&nazwisko=${encodeURIComponent(nazwisko)}&t=${Date.now()}`;
            const response = await fetch(url);
            const results = await response.json();
            
            setDebug(`Znaleziono ${results.length} wyników`);
            
            if (results.length === 0) {
                resultsList.innerHTML = '<div style="text-align:center; padding: 20px; color: #666;">❌ Nie znaleziono zawodników o podanym nazwisku</div>';
                return;
            }
            
            resultsList.innerHTML = results.map(player => `
                <div onclick="selectPlayer(${player.rowIndex}, '${player.ID}')" class="search-result-item">
                    <div style="font-weight: bold;">${player.Imię} ${player.Nazwisko}</div>
                    <div style="font-size: 0.85rem; color: #666;">ID: ${player.ID} | Rocznik: ${player.Rocznik} | Nr startowy: ${player.Nr_startowy || 'brak'}</div>
                    <div style="font-size: 0.85rem; margin-top: 4px;">
                        ${player.Pakiet_Odebrany === 'TAK' ? 
                            '<span style="color: #10b981;">✅ Pakiet odebrany</span>' : 
                            '<span style="color: #f97316;">⚠️ Pakiet nieodebrany</span>'}
                    </div>
                </div>
            `).join('');
            
        } catch(err) {
            setDebug(`❌ Błąd wyszukiwania: ${err}`);
            resultsList.innerHTML = '<div style="text-align:center; padding: 20px; color: #c62828;">❌ Błąd połączenia</div>';
        }
    }
    
    // Funkcja wyboru zawodnika z listy wyników
    window.selectPlayer = async function(rowIndex, id) {
        setDebug(`Wybrano zawodnika: ${id}`);
        searchResults.style.display = 'none';
        searchNazwisko.value = '';
        
        const result = await fetchPlayerById(id);
        if(result && result.success) {
            currentRowIndex = result.rowIndex;
            currentPlayerData = result.data;
            resultPanel.style.display = 'block';
            renderPlayerPanel(result);
            showAlert(`✅ Wybrano: ${result.data.Imię} ${result.data.Nazwisko}`, false);
            setDebug(`✅ Zawodnik w wierszu ${currentRowIndex}`);
            playBeep();
        } else {
            showAlert("Nie udało się pobrać danych zawodnika");
        }
    };
    
    // ==================== RENDEROWANIE DANYCH ====================
    function renderPlayerPanel(dataObj) {
        const d = dataObj.data;
        
        const isTaken = d.Pakiet_Odebrany === 'TAK';
        
        playerInfoDiv.innerHTML = `
            <div class="info-row">
                <span class="info-label">ID:</span>
                <span class="info-value">${d.ID || ''}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Imię i nazwisko:</span>
                <span class="info-value">${d.Imię || ''} ${d.Nazwisko || ''}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Rocznik:</span>
                <span class="info-value">${d.Rocznik || '—'}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Konkurencje:</span>
                <span class="info-value">${d.Konkurencja1 || '—'} ${d.Konkurencja2 ? '/ ' + d.Konkurencja2 : ''}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Numer startowy:</span>
                <span class="info-value">${d.Nr_startowy || 'Nieprzydzielony'}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Status pakietu:</span>
                <span class="package-status ${isTaken ? '' : 'package-absent'}">
                    ${isTaken ? '✅ ODEBRANY' : '❌ NIEODEBRANY'}
                </span>
            </div>
        `;
        
        if(isTaken) {
            confirmPackageBtn.style.opacity = '0.6';
            confirmPackageBtn.style.cursor = 'not-allowed';
            confirmPackageBtn.title = 'Pakiet już odebrany';
        } else {
            confirmPackageBtn.style.opacity = '1';
            confirmPackageBtn.style.cursor = 'pointer';
            confirmPackageBtn.title = 'Potwierdź odbiór pakietu';
        }
        
        editImie.value = d.Imię || '';
        editNazwisko.value = d.Nazwisko || '';
        editRocznik.value = d.Rocznik || '';
        editKonk1.value = d.Konkurencja1 || '';
        editKonk2.value = d.Konkurencja2 || '';
        editNrStartowy.value = d.Nr_startowy || '';
    }
    
    // ==================== OBSŁUGA ZNAJDOWANIA ZAWODNIKA ====================
    async function handleIdFound(id) {
        setDebug(`✨ Zeskanowano / wpisano ID: ${id}`);
        playBeep();
        stopScanner();
        
        const result = await fetchPlayerById(id);
        
        if(result && result.success) {
            currentRowIndex = result.rowIndex;
            currentPlayerData = result.data;
            resultPanel.style.display = 'block';
            renderPlayerPanel(result);
            showAlert(`✅ Znaleziono: ${result.data.Imię} ${result.data.Nazwisko}`, false);
            setDebug(`✅ Zawodnik w wierszu ${currentRowIndex}`);
        } else {
            resultPanel.style.display = 'none';
            currentRowIndex = null;
            currentPlayerData = null;
            const errorMsg = result?.error || "Nie znaleziono zawodnika";
            showAlert(errorMsg);
            setDebug(`❌ ${errorMsg}`);
        }
    }
    
    // ==================== ZAPISYWANIE ZMIAN ====================
    async function saveEdits() {
        if(!currentRowIndex) {
            showAlert("Brak załadowanego zawodnika");
            return;
        }
        
        const updates = {};
        
        if(editImie.value !== (currentPlayerData?.Imię || '')) 
            updates.Imię = editImie.value;
        if(editNazwisko.value !== (currentPlayerData?.Nazwisko || '')) 
            updates.Nazwisko = editNazwisko.value;
        if(editRocznik.value !== (currentPlayerData?.Rocznik || '')) 
            updates.Rocznik = editRocznik.value;
        if(editKonk1.value !== (currentPlayerData?.Konkurencja1 || '')) 
            updates.Konkurencja1 = editKonk1.value;
        if(editKonk2.value !== (currentPlayerData?.Konkurencja2 || '')) 
            updates.Konkurencja2 = editKonk2.value;
        if(editNrStartowy.value !== (currentPlayerData?.Nr_startowy || '')) 
            updates.Nr_startowy = editNrStartowy.value;
        
        if(Object.keys(updates).length === 0) {
            showAlert("Brak zmian do zapisania", false);
            return;
        }
        
        setDebug(`Zapisywanie zmian: ${JSON.stringify(updates)}`);
        
        const success = await updatePlayer(updates);
        
        if(success && currentPlayerData?.ID) {
            const refreshed = await fetchPlayerById(currentPlayerData.ID);
            if(refreshed?.success) {
                currentRowIndex = refreshed.rowIndex;
                currentPlayerData = refreshed.data;
                renderPlayerPanel(refreshed);
            }
        }
    }
    
    // ==================== POTWIERDZENIE ODBIORU PAKIETU ====================
    async function confirmPackage() {
        if(!currentRowIndex) {
            showAlert("Nie ma aktywnego zawodnika");
            return;
        }
        
        if(currentPlayerData?.Pakiet_Odebrany === 'TAK') {
            showAlert("Pakiet został już wcześniej odebrany!", false);
            return;
        }
        
        setDebug(`Potwierdzanie odbioru pakietu dla wiersza ${currentRowIndex}`);
        
        const success = await updatePlayer({ Pakiet_Odebrany: 'TAK' });
        
        if(success && currentPlayerData?.ID) {
            const refreshed = await fetchPlayerById(currentPlayerData.ID);
            if(refreshed?.success) {
                currentPlayerData = refreshed.data;
                renderPlayerPanel(refreshed);
                showAlert("✅ Pakiet oznaczony jako odebrany!", false);
                playBeep();
            }
        }
    }
    
    // ==================== CZYSZCZENIE ====================
    function clearPanel() {
        resultPanel.style.display = 'none';
        currentRowIndex = null;
        currentPlayerData = null;
        manualIdInput.value = '';
        searchResults.style.display = 'none';
        searchNazwisko.value = '';
        setDebug('Panel wyczyszczony, powrót do skanowania');
        showAlert("Powrót do skanowania", false);
    }
    
    // ==================== SKANER QR ====================
    async function startScanner() {
        if (isScanning) {
            setDebug('Skaner już działa');
            return;
        }
        
        setDebug('Uruchamianie skanera...');
        
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            showAlert('Twoja przeglądarka nie wspiera kamery. Użyj ręcznego wpisywania ID.');
            setDebug('❌ Brak wsparcia dla kamery');
            return;
        }
        
        if (html5QrCode) {
            try {
                await html5QrCode.stop();
            } catch(e) {}
            html5QrCode = null;
        }
        
        html5QrCode = new Html5Qrcode("reader");
        
        const config = {
            fps: 15,
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        };
        
        try {
            await html5QrCode.start(
                { facingMode: "environment" },
                config,
                (decodedText) => {
                    setDebug(`📷 Zeskanowano: ${decodedText}`);
                    handleIdFound(decodedText.trim());
                },
                (errorMessage) => {}
            );
            
            isScanning = true;
            startScanBtn.style.display = 'none';
            stopScanBtn.style.display = 'inline-block';
            setDebug('✅ Skaner uruchomiony, szukam kodu QR...');
            
        } catch (err) {
            setDebug(`❌ Błąd uruchomienia skanera: ${err}`);
            showAlert('Nie można uruchomić kamery. Sprawdź uprawnienia i upewnij się, że używasz HTTPS.');
        }
    }
    
    async function stopScanner() {
        if (html5QrCode && isScanning) {
            try {
                await html5QrCode.stop();
                setDebug('Skaner zatrzymany');
            } catch(e) {
                setDebug(`Błąd przy zatrzymywaniu: ${e}`);
            }
            isScanning = false;
        }
        startScanBtn.style.display = 'inline-block';
        stopScanBtn.style.display = 'none';
    }
    
    // ==================== INICJALIZACJA ====================
    startScanBtn.addEventListener('click', startScanner);
    stopScanBtn.addEventListener('click', stopScanner);
    manualSearchBtn.addEventListener('click', () => {
        const id = manualIdInput.value.trim();
        if(id) {
            stopScanner();
            handleIdFound(id);
        } else {
            showAlert("Wprowadź ID zawodnika");
        }
    });
    saveEditBtn.addEventListener('click', saveEdits);
    confirmPackageBtn.addEventListener('click', confirmPackage);
    clearBtn.addEventListener('click', clearPanel);
    searchByNazwiskoBtn.addEventListener('click', searchByNazwisko);
    searchNazwisko.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            searchByNazwisko();
        }
    });
    
    if (API_URL === 'https://script.google.com/macros/s/TWÓJ_URL/exec') {
        showAlert('⚠️ UWAGA: Musisz zmienić API_URL na swój adres z Apps Script!', true);
        setDebug('⚠️ API_URL nie został skonfigurowany!');
    } else {
        setDebug(`✅ API_URL skonfigurowany: ${API_URL.substring(0, 60)}...`);
    }
    
    setDebug('✅ Aplikacja gotowa! Kliknij "Uruchom skaner" lub wpisz ID ręcznie, lub szukaj po nazwisku.');
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Biuro zawodów 3.0</title>
<script src="https://unpkg.com"></script>

<style>
  body { font-family: sans-serif; text-align: center; background:#f2f2f2; margin: 0; padding: 0; overflow-x: hidden; }
  
  /* MENU GŁÓWNE NA CAŁY EKRAN */
  #menu-glowne { display: flex; flex-direction: column; height: 100vh; padding: 20px; box-sizing: border-box; justify-content: center; gap: 20px; }
  
  .btn-karta { 
    flex: 1; display: flex; align-items: center; justify-content: center; 
    font-size: 24px; font-weight: bold; border-radius: 20px; color: white; border: none; cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2); text-transform: uppercase;
  }
  .blue { background:#2196F3; }
  .green { background:#4CAF50; }
  .gray { background:#757575; }

  /* WIDOKI SEKCJI */
  .widok { display: none; min-height: 100vh; padding: 20px; box-sizing: border-box; background: white; position: absolute; top: 0; width: 100%; }
  
  #reader { width: 100%; border-radius: 15px; background: #000; margin-bottom: 20px; }
  
  input { width: 100%; padding: 18px; margin: 10px 0; font-size: 18px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
  
  .btn-akcja { width: 100%; padding: 20px; font-size: 18px; font-weight: bold; border-radius: 12px; border: none; margin-top: 10px; cursor: pointer; color: white; }
  .orange { background: #ff9800; }
  .dark { background: #333; }
</style>
</head>

<body>

<!-- EKRAN STARTOWY -->
<div id="menu-glowne">
  <button class="btn-karta blue" onclick="otworzSkaner()">📷 SKANUJ</button>
  <button class="btn-karta green" onclick="otworzSekcje('sekcja-nowy')">➕ NOWY ZAWODNIK</button>
  <button class="btn-karta gray" onclick="otworzSekcje('sekcja-szukaj')">🔍 SZUKAJ</button>
</div>

<!-- WIDOK: SKANER -->
<div id="widok-skaner" class="widok">
  <button class="btn-akcja dark" onclick="zamknijWszystko()">⬅ WRÓĆ DO MENU</button>
  <div id="reader"></div>
  <div id="wynik-skanu"></div>
</div>

<!-- WIDOK: NOWY ZAWODNIK -->
<div id="sekcja-nowy" class="widok">
  <button class="btn-akcja dark" onclick="zamknijWszystko()">⬅ WRÓĆ</button>
  <h2>Nowy zawodnik</h2>
  <input id="imie" placeholder="Imię">
  <input id="nazwisko" placeholder="Nazwisko">
  <input id="rocznik" placeholder="Rocznik">
  <input id="konkurencje" placeholder="Konkurencje">
  <button class="btn-akcja green" onclick="dodaj()">ZAPISZ ZAWODNIKA</button>
</div>

<!-- WIDOK: SZUKAJ -->
<div id="sekcja-szukaj" class="widok">
  <button class="btn-akcja dark" onclick="zamknijWszystko()">⬅ WRÓĆ</button>
  <h2>Szukaj</h2>
  <p>Opcja wkrótce...</p>
</div>

<script>
const API_URL = "TU_WKLEJ_URL";
let currentId = null;
let html5QrCode = null;

function otworzSekcje(id) {
  document.getElementById('menu-glowne').style.display = 'none';
  document.getElementById(id).style.display = 'block';
}

function zamknijWszystko() {
  if (html5QrCode && html5QrCode.isScanning) {
    html5QrCode.stop().then(() => {
      resetUI();
    }).catch(() => resetUI());
  } else {
    resetUI();
  }
}

function resetUI() {
  document.querySelectorAll('.widok').forEach(w => w.style.display = 'none');
  document.getElementById('menu-glowne').style.display = 'flex';
  document.getElementById('wynik-skanu').innerHTML = '';
}

function otworzSkaner() {
  otworzSekcje('widok-skaner');
  
  // Inicjalizacja skanera po otwarciu widoku
  if (!html5QrCode) {
    html5QrCode = new Html5Qrcode("reader");
  }
  
  const config = { fps: 10, qrbox: { width: 250, height: 250 } };
  
  html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
    .catch(err => {
      alert("Błąd kamery. Upewnij się, że używasz HTTPS i nadałeś uprawnienia.");
      zamknijWszystko();
    });
}

function onScanSuccess(decodedText) {
  html5QrCode.stop().then(() => {
    pobierzDane(decodedText);
  });
}

function pobierzDane(id) {
  fetch(API_URL + "?id=" + id)
    .then(res => res.json())
    .then(d => {
      currentId = d.id;
      document.getElementById('wynik-skanu').innerHTML = `
        <div style="background:#fff; padding:15px; border-radius:15px; border:2px solid #2196F3;">
          <h3>${d.imie} ${d.nazwisko}</h3>
          <input id="e_imie" value="${d.imie}">
          <input id="e_nazwisko" value="${d.nazwisko}">
          <input id="e_rocznik" value="${d.rocznik}">
          <input id="e_konkurencje" value="${d.konkurencje}">
          <button class="btn-akcja green" onclick="checkin()">✔ WYDAJ PAKIET</button>
          <button class="btn-akcja orange" onclick="zapiszEdycje()">💾 ZAPISZ ZMIANY</button>
        </div>
      `;
    })
    .catch(() => alert("Nie znaleziono zawodnika!"));
}

function checkin() {
  fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "checkin", id: currentId }) })
    .then(() => { alert("✅ Wydano!"); zamknijWszystko(); });
}

function zapiszEdycje() {
  const dane = {
    action: "edit", id: currentId,
    imie: document.getElementById("e_imie").value,
    nazwisko: document.getElementById("e_nazwisko").value,
    rocznik: document.getElementById("e_rocznik").value,
    konkurencje: document.getElementById("e_konkurencje").value
  };
  fetch(API_URL, { method: "POST", body: JSON.stringify(dane) })
    .then(() => { alert("💾 Zapisano!"); zamknijWszystko(); });
}

function dodaj() {
  const dane = {
    action: "add",
    imie: document.getElementById("imie").value,
    nazwisko: document.getElementById("nazwisko").value,
    rocznik: document.getElementById("rocznik").value,
    konkurencje: document.getElementById("konkurencje").value
  };
  fetch(API_URL, { method: "POST", body: JSON.stringify(dane) })
    .then(res => res.json())
    .then(() => { alert("Dodano!"); zamknijWszystko(); });
}
</script>

</body>
</html>

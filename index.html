<!DOCTYPE html>
<html>
<head>
    <title>Test połączenia</title>
</head>
<body>
    <h1>Test połączenia z Apps Script</h1>
    <input type="text" id="testId" placeholder="Wprowadź ID">
    <button onclick="testConnection()">Testuj</button>
    <pre id="result"></pre>

    <script>
    // PODMIEŃ NA SWÓJ URL APPS SCRIPT
    const API_URL = 'https://script.google.com/macros/s/AKfycbxg-Xoj--uMd0WK_IaKJFltd0vQ46YaK5_X0uWlLdyEBLyGhR7uTpKg2C3xb-VP0a-g/exec';
    
    async function testConnection() {
        const id = document.getElementById('testId').value;
        const resultDiv = document.getElementById('result');
        
        if (!id) {
            resultDiv.textContent = 'Wprowadź ID';
            return;
        }
        
        try {
            resultDiv.textContent = 'Łączenie...';
            const url = `${API_URL}?id=${encodeURIComponent(id)}&t=${Date.now()}`;
            console.log('URL:', url);
            
            const response = await fetch(url);
            console.log('Status:', response.status);
            
            const text = await response.text();
            console.log('Odpowiedź:', text);
            
            resultDiv.textContent = text;
            
        } catch (error) {
            console.error('Błąd:', error);
            resultDiv.textContent = 'Błąd: ' + error.message;
        }
    }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Biuro zawodów</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; text-align: center; background:#f2f2f2; }

button {
  width: 90%;
  padding: 18px;
  margin: 8px;
  font-size: 20px;
  border: none;
  border-radius: 10px;
}

.green { background:#4CAF50; color:white; }
.blue { background:#2196F3; color:white; }
.orange { background:#ff9800; color:white; }

.card {
  background:white;
  margin:10px;
  padding:15px;
  border-radius:10px;
}

input {
  width:90%;
  padding:12px;
  margin:5px;
  font-size:16px;
}
</style>

</head>

<body>

<h2>📋 Biuro zawodów</h2>

<!-- PRZYCISK SKANOWANIA -->
<button class="blue" onclick="startScan()">📷 Skanuj zawodnika</button>

<div id="reader"></div>

<!-- DANE ZAWODNIKA -->
<div id="zawodnik" class="card" style="display:none;"></div>

<!-- FORMULARZ EDYCJI -->
<div id="edycja" class="card" style="display:none;">
  <h3>Edycja zawodnika</h3>
  <input id="e_imie"><br>
  <input id="e_nazwisko"><br>
  <input id="e_rocznik"><br>
  <input id="e_konkurencje"><br>

  <button class="green" onclick="zapiszEdycje()">💾 Zapisz</button>
</div>

<!-- DODAWANIE (zawsze na dole) -->
<div class="card">
  <h3>➕ Nowy zawodnik</h3>
  <input id="imie" placeholder="Imię"><br>
  <input id="nazwisko" placeholder="Nazwisko"><br>
  <input id="rocznik" placeholder="Rocznik"><br>
  <input id="konkurencje" placeholder="Konkurencje"><br>
  <input id="nr" placeholder="Numer startowy"><br>

  <button class="green" onclick="dodaj()">Dodaj</button>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyCa1bGgo4CarwRp3JjYYwML3SQghse-MvQxEjByvlXj8SLP5eXrPC-NZduQizwLgMx/exec";
let currentId = null;
let scanner = null;

// START SKANOWANIA
function startScan() {
  document.getElementById("reader").innerHTML = "";

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess
  );
}
// reste widoku
function resetWidok() {
  document.getElementById("zawodnik").style.display = "none";
  document.getElementById("edycja").style.display = "none";
  document.getElementById("reader").innerHTML = "";
  currentId = null;
}
// PO SKANIE
function onScanSuccess(id) {
  scanner.stop();

  fetch(API_URL + "?id=" + id)
    .then(res => res.text())
    .then(text => {

      if (text === "NOT_FOUND") {
        alert("Nie znaleziono");
        return;
      }

      const d = JSON.parse(text);
      currentId = d.id;

      document.getElementById("zawodnik").style.display = "block";

      document.getElementById("zawodnik").innerHTML = `
        <h3>${d.imie} ${d.nazwisko}</h3>
        Nr: ${d.nr_startowy || "-"}<br>
        Rocznik: ${d.rocznik}<br>
        Konkurencje: ${d.konkurencje}<br>
        Pakiet: ${d.pakiet}<br><br>

        <button class="green" onclick="checkin()">✔ Wydaj pakiet</button>
        <button class="orange" onclick="pokazEdycje()">✏️ Edytuj</button>
      `;

      // wypełnij edycję
      document.getElementById("e_imie").value = d.imie;
      document.getElementById("e_nazwisko").value = d.nazwisko;
      document.getElementById("e_rocznik").value = d.rocznik;
      document.getElementById("e_konkurencje").value = d.konkurencje;
    });
}

// WYDANIE PAKIETU
function checkin() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "checkin",
      id: currentId
    })
  }).then(() => {
  alert("✅ Pakiet wydany");
  resetWidok();
});
}

// POKAŻ EDYCJĘ
function pokazEdycje() {
  document.getElementById("edycja").style.display = "block";
}

// ZAPIS EDYCJI
function zapiszEdycje() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "edit",
      id: currentId,
      imie: document.getElementById("e_imie").value,
      nazwisko: document.getElementById("e_nazwisko").value,
      rocznik: document.getElementById("e_rocznik").value,
      konkurencje: document.getElementById("e_konkurencje").value
    })
  }).then(() => {
  alert("💾 Zapisano");
  resetWidok();
});
}

// DODAWANIE
function dodaj() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "add",
      imie: document.getElementById("imie").value,
      nazwisko: document.getElementById("nazwisko").value,
      rocznik: document.getElementById("rocznik").value,
      konkurencje: document.getElementById("konkurencje").value,
      nr_startowy: document.getElementById("nr").value
    })
  })
  .then(res => res.json())
  .then(data => alert("Dodano ID: " + data.id));
  document.getElementById("imie").value = "";
  document.getElementById("nazwisko").value = "";
  document.getElementById("rocznik").value = "";
  document.getElementById("konkurencje").value = "";
  document.getElementById("nr").value = "";
}

</script>

</body>
</html>

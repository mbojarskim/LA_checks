<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Obsługa Pakietów - Zawody</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        body {
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 24px;
            transition: all 0.2s;
        }
        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 0.5rem;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sub {
            color: #475569;
            border-left: 4px solid #3b82f6;
            padding-left: 12px;
            margin-bottom: 24px;
        }
        .scan-area {
            background: #f8fafc;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border: 2px dashed #cbd5e1;
            margin-bottom: 24px;
        }
        #reader {
            width: 100%;
            max-width: 320px;
            margin: 12px auto;
        }
        button {
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin: 6px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        button:hover {
            background: #2563eb;
            transform: scale(0.98);
        }
        button.secondary {
            background: #64748b;
        }
        button.warning {
            background: #f97316;
        }
        button.success {
            background: #10b981;
        }
        button.danger {
            background: #ef4444;
        }
        .card {
            background: #f1f5f9;
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .info-label {
            font-weight: 600;
            color: #334155;
        }
        .info-value {
            font-weight: 500;
            color: #0f172a;
        }
        .package-status {
            background: #e6f7e6;
            border-radius: 40px;
            padding: 8px 16px;
            display: inline-block;
            font-weight: bold;
            color: #2e7d32;
        }
        .package-absent {
            background: #ffe6e6;
            color: #c62828;
        }
        .edit-group {
            margin: 16px 0;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
            margin-top: 4px;
        }
        .flex-btns {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }
        .alert {
            padding: 12px;
            border-radius: 28px;
            background: #fee2e2;
            color: #b91c1c;
            text-align: center;
            margin: 16px 0;
        }
        .alert-success {
            background: #e6f7e6;
            color: #2e7d32;
        }
        hr {
            margin: 20px 0;
        }
        footer {
            font-size: 0.75rem;
            text-align: center;
            color: #94a3b8;
            margin-top: 28px;
        }
        .debug-info {
            font-size: 0.7rem;
            color: #666;
            margin-top: 10px;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 8px;
            word-break: break-all;
        }
        @media (max-width: 500px) {
            .container { padding: 16px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>📦 Odbiór pakietów 2.0</h1>
    <div class="sub">Zeskanuj kod QR (ID zawodnika)</div>

    <div class="scan-area">
        <div id="reader" style="width:100%;"></div>
        <button id="startScanBtn" class="secondary">📷 Uruchom skaner</button>
        <button id="stopScanBtn" style="display:none;">⏹️ Zatrzymaj</button>
        <p style="font-size:13px; margin-top:12px;">lub wpisz ID ręcznie:</p>
        <input type="text" id="manualId" placeholder="np. 00123" style="width:70%; display:inline-block;">
        <button id="manualSearchBtn">🔍 Szukaj</button>
    </div>

    <div id="resultPanel" style="display:none;">
        <div class="card">
            <h3>🏃 Dane zawodnika</h3>
            <div id="playerInfo"></div>
            
            <div id="packageSection"></div>
            
            <div class="edit-group">
                <h4>✏️ Edycja danych</h4>
                <div class="info-row">
                    <span class="info-label">Imię:</span>
                    <input type="text" id="editImie" placeholder="Imię">
                </div>
                <div class="info-row">
                    <span class="info-label">Nazwisko:</span>
                    <input type="text" id="editNazwisko" placeholder="Nazwisko">
                </div>
                <div class="info-row">
                    <span class="info-label">Numer startowy:</span>
                    <input type="text" id="editNrStartowy" placeholder="Numer startowy">
                </div>
                <div class="info-row">
                    <span class="info-label">Konkurencja1:</span>
                    <input type="text" id="editKonk1" placeholder="Konkurencja 1">
                </div>
                <div class="info-row">
                    <span class="info-label">Konkurencja2:</span>
                    <input type="text" id="editKonk2" placeholder="Konkurencja 2">
                </div>
            </div>
            
            <div class="flex-btns">
                <button id="saveEditBtn" class="success">💾 Zapisz zmiany</button>
                <button id="confirmPackageBtn" class="warning">✅ Potwierdź odbiór pakietu</button>
                <button id="clearBtn" class="secondary">🗑️ Wyczyść</button>
            </div>
        </div>
    </div>
    
    <div id="debugPanel" class="debug-info" style="display:none;">
        <strong>Debug:</strong> <span id="debugMsg">Gotowy</span>
    </div>
    
    <footer>Po zeskanowaniu możesz edytować dane przed odebraniem pakietu.</footer>
</div>

<!-- Biblioteka HTML5 QR Code -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
    // ==================== KONFIGURACJA ====================
    // 🔁 ZMIEŃ TEN URL NA ADRES TWOJEGO WDROŻONEGO SKRYPTU APPS SCRIPT
    const API_URL = 'https://script.google.com/macros/s/AKfycbyCa1bGgo4CarwRp3JjYYwML3SQghse-MvQxEjByvlXj8SLP5eXrPC-NZduQizwLgMx/exec'; // <-- WKLEJ SWÓJ URL
    
    let currentRowIndex = null;
    let currentPlayerData = null;
    let html5QrCode = null;
    
    // Elementy DOM
    const resultPanel = document.getElementById('resultPanel');
    const playerInfoDiv = document.getElementById('playerInfo');
    const packageSection = document.getElementById('packageSection');
    const debugPanel = document.getElementById('debugPanel');
    const debugMsg = document.getElementById('debugMsg');
    
    // Pola edycji
    const editImie = document.getElementById('editImie');
    const editNazwisko = document.getElementById('editNazwisko');
    const editNrStartowy = document.getElementById('editNrStartowy');
    const editKonk1 = document.getElementById('editKonk1');
    const editKonk2 = document.getElementById('editKonk2');
    
    // Przyciski
    const startScanBtn = document.getElementById('startScanBtn');
    const stopScanBtn = document.getElementById('stopScanBtn');
    const manualSearchBtn = document.getElementById('manualSearchBtn');
    const saveEditBtn = document.getElementById('saveEditBtn');
    const confirmPackageBtn = document.getElementById('confirmPackageBtn');
    const clearBtn = document.getElementById('clearBtn');
    const manualIdInput = document.getElementById('manualId');
    
    // Funkcje pomocnicze
    function showAlert(msg, isError = true) {
        const oldAlert = document.querySelector('.alert');
        if(oldAlert) oldAlert.remove();
        const alertDiv = document.createElement('div');
        alertDiv.className = isError ? 'alert' : 'alert alert-success';
        alertDiv.innerText = msg;
        document.getElementById('app').insertBefore(alertDiv, resultPanel);
        setTimeout(() => alertDiv.remove(), 4000);
    }
    
    function setDebug(msg) {
        debugMsg.innerText = msg;
        debugPanel.style.display = 'block';
        console.log(msg);
    }
    
    // Pobieranie danych z arkusza po ID
    async function fetchPlayerById(id) {
        try {
            setDebug(`Pobieranie danych dla ID: ${id}`);
            const url = `${API_URL}?id=${encodeURIComponent(id)}&t=${Date.now()}`;
            setDebug(`URL: ${url}`);
            
            const response = await fetch(url);
            setDebug(`Status odpowiedzi: ${response.status}`);
            
            const text = await response.text();
            setDebug(`Odpowiedź surowa: ${text.substring(0, 200)}`);
            
            const data = JSON.parse(text);
            
            if(data.error) {
                showAlert(data.error);
                setDebug(`Błąd: ${data.error}`);
                return null;
            }
            
            if(!data.success) {
                showAlert("Nieprawidłowa odpowiedź z serwera");
                setDebug(`Nieprawidłowa odpowiedź: ${JSON.stringify(data)}`);
                return null;
            }
            
            setDebug(`Pobrano dane: ${JSON.stringify(data.data)}`);
            return data;
            
        } catch(err) {
            console.error(err);
            setDebug(`Błąd: ${err.toString()}`);
            showAlert(`Błąd połączenia: ${err.message}`);
            return null;
        }
    }
    
    // Wysyłanie aktualizacji do arkusza
    async function updatePlayer(updatesObj) {
        if(!currentRowIndex) {
            showAlert("Nie wczytano danych zawodnika");
            return false;
        }
        
        try {
            setDebug(`Aktualizacja wiersza ${currentRowIndex}: ${JSON.stringify(updatesObj)}`);
            
            const payload = {
                rowIndex: currentRowIndex,
                updates: updatesObj
            };
            
            const response = await fetch(API_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            });
            
            const text = await response.text();
            setDebug(`Odpowiedź aktualizacji: ${text}`);
            
            const data = JSON.parse(text);
            
            if(data.success) {
                showAlert("✅ Zaktualizowano dane!", false);
                return true;
            } else {
                showAlert(`Błąd aktualizacji: ${data.error || 'Nieznany błąd'}`);
                return false;
            }
            
        } catch(err) {
            console.error(err);
            setDebug(`Błąd aktualizacji: ${err.toString()}`);
            showAlert(`Błąd aktualizacji: ${err.message}`);
            return false;
        }
    }
    
    // Renderowanie danych w panelu
    function renderPlayerPanel(dataObj) {
        const d = dataObj.data;
        
        let konkurencjeHtml = '';
        const konk1 = d.Konkurencja1 || '—';
        const konk2 = d.Konkurencja2 || '—';
        if((konk1 === '—' || konk1 === '') && (konk2 === '—' || konk2 === '')) {
            konkurencjeHtml = '<span style="color:gray;">Nie startuje w żadnej konkurencji</span>';
        } else {
            konkurencjeHtml = `${konk1} ${konk2 && konk2 !== '—' ? ' / ' + konk2 : ''}`;
        }
        
        const startNumber = d.Nr_startowy || 'Nieprzydzielony';
        
        playerInfoDiv.innerHTML = `
            <div class="info-row"><span class="info-label">ID:</span><span class="info-value">${d.ID || '?'}</span></div>
            <div class="info-row"><span class="info-label">Imię i nazwisko:</span><span class="info-value">${d.Imię || ''} ${d.Nazwisko || ''}</span></div>
            <div class="info-row"><span class="info-label">Rocznik:</span><span class="info-value">${d.Rocznik || '—'}</span></div>
            <div class="info-row"><span class="info-label">Konkurencje:</span><span class="info-value">${konkurencjeHtml}</span></div>
            <div class="info-row"><span class="info-label">Numer startowy:</span><span class="info-value">${startNumber}</span></div>
        `;
        
        const isTaken = d.Pakiet_Odebrany === 'TAK';
        packageSection.innerHTML = `
            <div class="info-row">
                <span class="info-label">Status pakietu:</span>
                <span class="package-status ${isTaken ? '' : 'package-absent'}">${isTaken ? '✅ ODEBRANY' : '❌ NIEODEBRANY'}</span>
            </div>
            ${isTaken ? '<p style="color:green; margin-top:8px;">✔️ Pakiet został już wcześniej odebrany.</p>' : ''}
        `;
        
        editImie.value = d.Imię || '';
        editNazwisko.value = d.Nazwisko || '';
        editNrStartowy.value = d.Nr_startowy || '';
        editKonk1.value = d.Konkurencja1 || '';
        editKonk2.value = d.Konkurencja2 || '';
    }
    
    // Główna funkcja po znalezieniu ID
    async function handleIdFound(id) {
        setDebug(`Znaleziono ID: ${id}`);
        stopScanner();
        
        const result = await fetchPlayerById(id);
        
        if(result && result.success && result.data) {
            currentRowIndex = result.rowIndex;
            currentPlayerData = result.data;
            resultPanel.style.display = 'block';
            renderPlayerPanel(result);
            showAlert(`Znaleziono zawodnika: ${result.data.Imię} ${result.data.Nazwisko}`, false);
        } else {
            resultPanel.style.display = 'none';
            currentRowIndex = null;
            currentPlayerData = null;
            if(result && result.error) {
                showAlert(result.error);
            }
        }
    }
    
    // Zapis zmian
    async function saveEdits() {
        if(!currentRowIndex) {
            showAlert("Brak załadowanego zawodnika");
            return;
        }
        
        const updates = {};
        if(editImie.value !== currentPlayerData?.Imię) updates.Imię = editImie.value;
        if(editNazwisko.value !== currentPlayerData?.Nazwisko) updates.Nazwisko = editNazwisko.value;
        if(editNrStartowy.value !== currentPlayerData?.Nr_startowy) updates.Nr_startowy = editNrStartowy.value;
        if(editKonk1.value !== currentPlayerData?.Konkurencja1) updates.Konkurencja1 = editKonk1.value;
        if(editKonk2.value !== currentPlayerData?.Konkurencja2) updates.Konkurencja2 = editKonk2.value;
        
        if(Object.keys(updates).length === 0) {
            showAlert("Brak zmian do zapisania", false);
            return;
        }
        
        const success = await updatePlayer(updates);
        
        if(success && currentPlayerData?.ID) {
            const refreshed = await fetchPlayerById(currentPlayerData.ID);
            if(refreshed && refreshed.success) {
                currentRowIndex = refreshed.rowIndex;
                currentPlayerData = refreshed.data;
                renderPlayerPanel(refreshed);
            }
        }
    }
    
    // Potwierdzenie odbioru pakietu
    async function confirmPackage() {
        if(!currentRowIndex) {
            showAlert("Nie ma aktywnego zawodnika");
            return;
        }
        
        if(currentPlayerData?.Pakiet_Odebrany === 'TAK') {
            showAlert("Pakiet był już oznaczony jako odebrany!", false);
            return;
        }
        
        const success = await updatePlayer({ Pakiet_Odebrany: 'TAK' });
        
        if(success && currentPlayerData?.ID) {
            const refreshed = await fetchPlayerById(currentPlayerData.ID);
            if(refreshed && refreshed.success) {
                currentRowIndex = refreshed.rowIndex;
                currentPlayerData = refreshed.data;
                renderPlayerPanel(refreshed);
            }
        }
    }
    
    // Czyszczenie panelu
    function clearPanel() {
        resultPanel.style.display = 'none';
        currentRowIndex = null;
        currentPlayerData = null;
        manualIdInput.value = '';
        setDebug('Panel wyczyszczony');
    }
    
    // ==================== SKANER KODÓW QR ====================
    function startScanner() {
        if(html5QrCode && html5QrCode.isScanning) {
            return;
        }
        
        html5QrCode = new Html5Qrcode("reader");
        const config = { 
            fps: 10, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        };
        
        html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            (decodedText) => {
                setDebug(`Zeskanowano: ${decodedText}`);
                handleIdFound(decodedText.trim());
            }, 
            (error) => {
                // Ignoruj błędy odczytu
                if (error && !error.includes("No MultiFormat Readers")) {
                    setDebug(`Błąd skanowania: ${error}`);
                }
            }
        ).then(() => {
            startScanBtn.style.display = 'none';
            stopScanBtn.style.display = 'inline-block';
            setDebug('Skaner uruchomiony');
        }).catch(err => {
            console.warn("Błąd kamery: ", err);
            setDebug(`Błąd kamery: ${err}`);
            showAlert("Nie udało się uruchomić kamery. Sprawdź uprawnienia i czy używasz HTTPS.");
        });
    }
    
    function stopScanner() {
        if(html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                startScanBtn.style.display = 'inline-block';
                stopScanBtn.style.display = 'none';
                setDebug('Skaner zatrzymany');
            }).catch(err => {
                setDebug(`Błąd zatrzymania: ${err}`);
                startScanBtn.style.display = 'inline-block';
                stopScanBtn.style.display = 'none';
            });
        } else {
            startScanBtn.style.display = 'inline-block';
            stopScanBtn.style.display = 'none';
        }
    }
    
    // ==================== OBSŁUGA ZDARZEŃ ====================
    startScanBtn.addEventListener('click', startScanner);
    stopScanBtn.addEventListener('click', stopScanner);
    manualSearchBtn.addEventListener('click', () => {
        const manualId = manualIdInput.value.trim();
        if(manualId) {
            stopScanner();
            handleIdFound(manualId);
        } else {
            showAlert("Wprowadź ID");
        }
    });
    saveEditBtn.addEventListener('click', saveEdits);
    confirmPackageBtn.addEventListener('click', confirmPackage);
    clearBtn.addEventListener('click', clearPanel);
    
    // Test połączenia przy starcie
    window.addEventListener('load', () => {
        setDebug('Aplikacja załadowana. URL API: ' + API_URL);
        if(API_URL === 'https://script.google.com/macros/s/AKfycbxxxxxx/exec') {
            showAlert('⚠️ Pamiętaj o podmianie API_URL na właściwy adres skryptu Apps Script!', true);
        }
    });
    
    window.addEventListener('beforeunload', () => {
        if(html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop();
        }
    });
</script>
</body>
</html>
